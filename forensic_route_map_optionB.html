<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>

<title>Forensic Location Viewer</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<style>

body{
margin:0;
font-family:Arial;
}

#map{
height:60vh;
width:100%;
}

#timeline{
height:40vh;
overflow-y:auto;
padding:10px;
background:#fafafa;
}

.item{
padding:8px;
border-bottom:1px solid #ddd;
}

.item:hover{
background:#eee;
cursor:pointer;
}

</style>
</head>

<body>

<div id="map"></div>
<div style="padding:10px;background:#fff;border-top:1px solid #ccc">
<label>Jump to date:</label>
<input type="date" id="dateJump">
<button onclick="jumpToDate()">Go</button>
</div>

<div style="padding:10px;background:#fff;border-top:1px solid #ccc">
<label>Jump to date:</label>
<input type="date" id="dateJump">
<button onclick="jumpToDate()">Go</button>
</div>

<div id="timeline"></div>

<script>

let map=L.map('map').setView([54,-106],5)

L.tileLayer(
'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',
{maxZoom:19}
).addTo(map)

let points=[]

fetch("location-history.json")
.then(r=>r.json())
.then(json=>{

json.forEach(item=>{

if(item.visit){

let p=item.visit.topCandidate.placeLocation
.replace("geo:","")
.split(",")

points.push({
type:"Stop",
lat:parseFloat(p[0]),
lon:parseFloat(p[1]),
time:item.startTime
})

}

if(item.activity){

let s=item.activity.start.replace("geo:","").split(",")
let e=item.activity.end.replace("geo:","").split(",")

points.push({
type:"Movement Start",
lat:parseFloat(s[0]),
lon:parseFloat(s[1]),
time:item.startTime
})

points.push({
type:"Movement End",
lat:parseFloat(e[0]),
lon:parseFloat(e[1]),
time:item.endTime
})

}

})

points.sort((a,b)=>new Date(a.time)-new Date(b.time))

buildTimeline()

})

function buildTimeline(){

let t=document.getElementById("timeline")

points.forEach(p=>{

let d=new Date(p.time)

let div=document.createElement("div")
div.className="item"

div.innerHTML=
d.toLocaleDateString()+" "+
d.toLocaleTimeString([], {hour:'numeric',minute:'2-digit'})+
"<br>"+p.type

div.onclick=()=>{

map.panTo([p.lat,p.lon])
L.marker([p.lat,p.lon]).addTo(map)
document.getElementsByClassName("item")[i].scrollIntoView({block:"start"});
}

t.appendChild(div)

})

}
function jumpToDate(){

let input=document.getElementById("dateJump").value
if(!input) return

let target=new Date(input)

for(let p of points){

let d=new Date(p.time)

if(
d.getFullYear()===target.getFullYear() &&
d.getMonth()===target.getMonth() &&
d.getDate()===target.getDate()
){

map.panTo([p.lat,p.lon])
L.marker([p.lat,p.lon]).addTo(map)
document.getElementsByClassName("item")[i].scrollIntoView({block:"start"});
break
}

}

}
</script>

</body>
</html>
