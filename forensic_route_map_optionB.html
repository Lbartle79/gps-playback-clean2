<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>

<title>Forensic Investigator Map</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<style>

body{
margin:0;
font-family:Arial, sans-serif;
background:#f5f5f5;
}

#map{
height:60vh;
width:100%;
}

#controls{
padding:10px;
background:white;
border-bottom:1px solid #ccc;
}

#timeline{
height:35vh;
overflow-y:auto;
padding:10px;
background:white;
}

.item{
padding:8px;
border-bottom:1px solid #eee;
}

.item:hover{
background:#f0f0f0;
cursor:pointer;
}

button{
padding:6px 10px;
margin-right:6px;
}

</style>
</head>

<body>

<div id="map"></div>

<div id="controls">
<button onclick="toggleSatellite()">Toggle Satellite</button>
<button onclick="playTimeline()">Play</button>
</div>

<div id="timeline"></div>

<script>

let map=L.map('map').setView([54,-106],5);

let roadLayer=L.tileLayer(
'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',
{maxZoom:19}
).addTo(map);

let satLayer=L.tileLayer(
'https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}',
{maxZoom:19}
);

let satellite=false;

function toggleSatellite(){
if(satellite){
map.removeLayer(satLayer);
map.addLayer(roadLayer);
satellite=false;
}else{
map.removeLayer(roadLayer);
map.addLayer(satLayer);
satellite=true;
}
}

let markers=[];
let data=[];

fetch("location-history.json")
.then(r=>r.json())
.then(json=>{

json.forEach(item=>{

if(item.visit){

let p=item.visit.topCandidate.placeLocation
.replace("geo:","")
.split(",");

data.push({
type:"stop",
lat:parseFloat(p[0]),
lon:parseFloat(p[1]),
time:item.startTime
});

}

if(item.activity){

let s=item.activity.start
.replace("geo:","")
.split(",");

let e=item.activity.end
.replace("geo:","")
.split(",");

data.push({
type:"movement_start",
lat:parseFloat(s[0]),
lon:parseFloat(s[1]),
time:item.startTime
});

data.push({
type:"movement_end",
lat:parseFloat(e[0]),
lon:parseFloat(e[1]),
time:item.endTime
});

}

});

data.sort((a,b)=>new Date(a.time)-new Date(b.time));

buildTimeline();

});

function buildTimeline(){

let div=document.getElementById("timeline");

data.forEach((p,i)=>{

let d=new Date(p.time);

let el=document.createElement("div");
el.className="item";

el.innerHTML=
d.toLocaleDateString()+" "+
d.toLocaleTimeString([], {hour:'numeric',minute:'2-digit'})+
"<br>"+p.type+
"<br>"+p.lat.toFixed(5)+", "+p.lon.toFixed(5);

el.onclick=()=>{

map.panTo([p.lat,p.lon]);

let m=L.marker([p.lat,p.lon]).addTo(map);

markers.push(m);

};

div.appendChild(el);

});

}

let playIndex=0;

function playTimeline(){

playIndex=0;

let timer=setInterval(()=>{

if(playIndex>=data.length){
clearInterval(timer);
return;
}

let p=data[playIndex];

map.setView([p.lat,p.lon],10);

let m=L.circleMarker(
[p.lat,p.lon],
{radius:6}
).addTo(map);

markers.push(m);

playIndex++;

},800);

}

</script>

</body>
</html>
