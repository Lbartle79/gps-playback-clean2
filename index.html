<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>GPS Timeline Viewer</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<style>

body{
font-family: Arial;
margin:0;
display:flex;
height:100vh;
}

#list{
width:420px;
overflow:auto;
border-right:1px solid #ccc;
padding:15px;
font-size:18px;
}

.segment{
padding:10px;
margin-bottom:8px;
border:1px solid #ccc;
cursor:pointer;
}

.segment:hover{
background:#eee;
}

#map{
flex:1;
}

</style>
</head>

<body>

<div id="list">Loading data...</div>
<div id="map"></div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>

const map = L.map('map').setView([53,-105],6);

L.tileLayer(
'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',
{maxZoom:19}
).addTo(map);

let marker;
let line;

fetch("location-history.json")
.then(r=>r.json())
.then(data=>{

const segments = data;

const list = document.getElementById("list");
list.innerHTML="";

segments.forEach((s,i)=>{

let start,end,startLat,startLng,endLat,endLng;

if(s.activitySegment){

start = new Date(s.activitySegment.duration.startTimestamp);
end = new Date(s.activitySegment.duration.endTimestamp);

startLat = s.activitySegment.startLocation.latitudeE7/1e7;
startLng = s.activitySegment.startLocation.longitudeE7/1e7;

endLat = s.activitySegment.endLocation.latitudeE7/1e7;
endLng = s.activitySegment.endLocation.longitudeE7/1e7;

}else if(s.placeVisit){

start = new Date(s.placeVisit.duration.startTimestamp);
end = new Date(s.placeVisit.duration.endTimestamp);

startLat = s.placeVisit.location.latitudeE7/1e7;
startLng = s.placeVisit.location.longitudeE7/1e7;

endLat = startLat;
endLng = startLng;

}else{
return;
}

const dur = Math.round((end-start)/60000);

const div = document.createElement("div");
div.className="segment";

div.innerHTML = `
<b>${start.toLocaleDateString()}</b><br>
Start: ${start.toLocaleTimeString()}<br>
End: ${end.toLocaleTimeString()}<br>
Duration: ${dur} minutes<br>
Start: ${startLat.toFixed(5)}, ${startLng.toFixed(5)}<br>
End: ${endLat.toFixed(5)}, ${endLng.toFixed(5)}
`;

div.onclick=()=>{

if(marker) map.removeLayer(marker);
if(line) map.removeLayer(line);

marker = L.marker([startLat,startLng]).addTo(map);

line = L.polyline([
[startLat,startLng],
[endLat,endLng]
],{color:"red"}).addTo(map);

map.setView([startLat,startLng],15);

};

list.appendChild(div);

});

});

</script>

</body>
</html>
