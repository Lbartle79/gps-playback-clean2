<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>GPS Timeline Viewer</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<style>

body{
margin:0;
font-family:Arial;
display:flex;
flex-direction:column;
height:100vh;
}

#map{
height:55vh;
}

#controls{
padding:10px;
background:#eee;
}

button{
font-size:18px;
padding:6px 10px;
}

#list{
height:45vh;
overflow:auto;
padding:12px;
font-size:20px;
}

.day{
font-weight:bold;
font-size:22px;
margin-top:18px;
margin-bottom:8px;
}

.segment{
border:1px solid #ccc;
margin-bottom:8px;
padding:10px;
cursor:pointer;
background:white;
}

.segment:hover{
background:#eee;
}

.segment.active{
background:#dfefff;
border-color:#0077ff;
}

</style>
</head>

<body>

<div id="map"></div>

<div id="controls">
<button onclick="toggleMap()">Toggle Satellite</button>
</div>

<div id="list">Loading timeline…</div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>

const map=L.map('map').setView([52,-105],6);

let street=L.tileLayer(
'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',
{maxZoom:19}
).addTo(map);

let satellite=L.tileLayer(
'https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}',
{maxZoom:19}
);

let currentLayer="street";

function toggleMap(){

if(currentLayer==="street"){
map.removeLayer(street);
satellite.addTo(map);
currentLayer="satellite";
}else{
map.removeLayer(satellite);
street.addTo(map);
currentLayer="street";
}

}

let marker;
let line;

fetch("location-history.json")
.then(r=>r.json())
.then(data=>{

const list=document.getElementById("list");
list.innerHTML="";

let currentDay="";

data.forEach(seg=>{

const start=new Date(seg.startTime);
const end=new Date(seg.endTime);

const day=start.toDateString();

if(day!==currentDay){

currentDay=day;

const dayDiv=document.createElement("div");
dayDiv.className="day";
dayDiv.textContent=day;

list.appendChild(dayDiv);

}

const startCoords=seg.activity.start.replace("geo:","").split(",");
const endCoords=seg.activity.end.replace("geo:","").split(",");

const startLat=parseFloat(startCoords[0]);
const startLng=parseFloat(startCoords[1]);

const endLat=parseFloat(endCoords[0]);
const endLng=parseFloat(endCoords[1]);

const dur=Math.round((end-start)/60000);

const div=document.createElement("div");
div.className="segment";

div.innerHTML=`
${start.toLocaleTimeString()} → ${end.toLocaleTimeString()}<br>
Duration: ${dur} minutes
`;

div.onclick=()=>{

document.querySelectorAll(".segment")
.forEach(s=>s.classList.remove("active"));

div.classList.add("active");

if(marker)map.removeLayer(marker);
if(line)map.removeLayer(line);

marker=L.marker([startLat,startLng]).addTo(map);

line=L.polyline(
[[startLat,startLng],[endLat,endLng]],
{color:"red"}
).addTo(map);

map.setView([startLat,startLng],15);

};

list.appendChild(div);

});

});

</script>

</body>
</html>
