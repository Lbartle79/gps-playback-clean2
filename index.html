<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8" />
<title>Clean Map Test</title>

<link
  rel="stylesheet"
  href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
/>

<style>
body { margin: 0; font-family: Arial; }
#map { height: 100vh; }
</style>
</head>

<body>

<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>
const map = L.map('map').setView([53.2, -105.75], 7);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  maxZoom: 19
}).addTo(map);

L.marker([53.2, -105.75]).addTo(map)
  .bindPopup("Map is working.")
  .openPopup();
</script>

</body>
</html>
