<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Forensic Location Viewer</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<style>

body{
margin:0;
font-family:Arial, Helvetica, sans-serif;
font-size:22px;
}

#controls{
padding:16px;
background:#f0f0f0;
border-bottom:1px solid #ccc;
font-size:22px;
}

#controls input{
font-size:22px;
padding:8px;
}

#controls button{
font-size:22px;
padding:10px 16px;
margin-left:10px;
}

#map{
height:50vh;
width:100%;
}

#timeline{
height:50vh;
overflow-y:auto;
padding:18px;
background:#ffffff;
font-size:22px;
line-height:1.6;
}

.dayTitle{
font-weight:bold;
margin-top:25px;
font-size:28px;
}

.stop{
padding:16px;
border-bottom:1px solid #ddd;
cursor:pointer;
}

.stop:hover{
background:#eef3ff;
}

</style>
</head>

<body>

<div id="controls">

Jump to date:
<input type="date" id="dateJump">
<button onclick="jumpToDate()">Go</button>

<button onclick="toggleSatellite()">Satellite</button>

</div>

<div id="map"></div>

<div id="timeline"></div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>

let map = L.map('map').setView([53,-106],6)
let bigIcon = L.icon({
iconUrl:'https://unpkg.com/leaflet@1.9.4/dist/images/marker-icon.png',
iconSize:[40,65],
iconAnchor:[20,65],
popupAnchor:[0,-55]
})
let streetLayer = L.tileLayer(
'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',
{maxZoom:19}
).addTo(map)

let satelliteLayer = L.tileLayer(
'https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}',
{maxZoom:19}
)

let satellite=false

function toggleSatellite(){

if(!satellite){
map.removeLayer(streetLayer)
map.addLayer(satelliteLayer)
satellite=true
}else{
map.removeLayer(satelliteLayer)
map.addLayer(streetLayer)
satellite=false
}



let startMarker=null
let endMarker=null
let activeStopMarker=null
let routeLine=null

let stopsByDay={}

function parsePoint(p){
let coords=p.replace("geo:","").split(",")
return [parseFloat(coords[0]),parseFloat(coords[1])]
}

function formatTime(t){

let d=new Date(t)

let h=d.getHours()
let m=d.getMinutes()

let ampm=h>=12?"PM":"AM"

h=h%12
if(h==0)h=12

m=m<10?"0"+m:m

return h+":"+m+" "+ampm

}

function formatDate(t){

let d=new Date(t)
return d.toISOString().split("T")[0]

}

fetch("location-history.json")
.then(r=>r.json())
.then(data=>{

data.forEach(entry=>{

let start=entry.startTime
let end=entry.endTime

let day=formatDate(start)

if(!stopsByDay[day])stopsByDay[day]=[]

if(entry.visit){

let p=parsePoint(entry.visit.topCandidate.placeLocation)

stopsByDay[day].push({
type:"visit",
coords:p,
start:start,
end:end
})

}

if(entry.activity){

let p=parsePoint(entry.activity.start)

stopsByDay[day].push({
type:"activity",
coords:p,
start:start,
end:end
})

}

if(entry.timelinePath){

entry.timelinePath.forEach(pt=>{

let p=parsePoint(pt.point)

stopsByDay[day].push({
type:"breadcrumb",
coords:p,
start:start,
end:end
})

})

}

})

buildTimeline()

})

function buildTimeline(){

let timeline=document.getElementById("timeline")

Object.keys(stopsByDay).sort().forEach(day=>{

let title=document.createElement("div")
title.className="dayTitle"
title.id = "day-"+day
title.innerText=day
timeline.appendChild(title)

stopsByDay[day].forEach((stop,i)=>{

if(stop.type=="breadcrumb")return

let div=document.createElement("div")
div.className="stop"

let duration=(new Date(stop.end)-new Date(stop.start))/60000

div.innerHTML=

"Arrival: "+formatTime(stop.start)+"<br>"+
"Departure: "+formatTime(stop.end)+"<br>"+
"Duration: "+Math.round(duration)+" minutes"

div.onclick=()=>selectStop(day,i)

timeline.appendChild(div)

})

})

}

function drawRoute(day){

if(routeLine)map.removeLayer(routeLine)

let pts=[]

stopsByDay[day].forEach(s=>{
if(s.type=="breadcrumb")pts.push(s.coords)
})

if(pts.length>1){

routeLine=L.polyline(pts,{color:"blue"}).addTo(map)

map.fitBounds(routeLine.getBounds())

}

}

function selectStop(day,index){

let stops=stopsByDay[day]
let stop=stops[index]

if(activeStopMarker)map.removeLayer(activeStopMarker)

activeStopMarker=L.marker(stop.coords).addTo(map)

activeStopMarker.bindPopup(
formatDate(stop.start)+"<br>"+
"Arrival: "+formatTime(stop.start)+"<br>"+
"Departure: "+formatTime(stop.end)
).openPopup()

}

function loadDay(day){

let stops = stopsByDay[day]

if(!stops) return

if(startMarker) map.removeLayer(startMarker)
if(endMarker) map.removeLayer(endMarker)
if(activeStopMarker) map.removeLayer(activeStopMarker)

let first = stops[0]
let last = stops[stops.length-1]

startMarker = L.marker(first.coords)
.addTo(map)
.bindPopup("START<br>"+formatTime(first.start))

endMarker = L.marker(last.coords)
.addTo(map)
.bindPopup("END<br>"+formatTime(last.end))

drawRoute(day)
let bounds = L.latLngBounds(stops.map(s => s.coords))
map.fitBounds(bounds, {padding:[40,40]})
}

function jumpToDate(){

let date = document.getElementById("dateJump").value

if(stopsByDay[date]){

loadDay(date)

/* scroll timeline to the selected date */

let dayElement = document.getElementById("day-"+date)

if(dayElement){

dayElement.scrollIntoView({
behavior:"smooth",
block:"start"
})

}

}else{

alert("No data for this date")

}

}

</script>

</body>
</html>
