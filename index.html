<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>

<title>GPS Timeline (Full Real Data)</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<style>
body { margin:0; font-family:Arial; }
#controls { padding:10px; background:#f0f0f0; border-bottom:1px solid #ccc; }
#map { height:50vh; }
#timeline { height:50vh; overflow-y:auto; padding:10px; background:#fafafa; }
.item { padding:10px; border-bottom:1px solid #ddd; cursor:pointer; }
.item:hover { background:#eee; }
.small { font-size:14px; color:#555; }
</style>
</head>

<body>

<div id="controls">
<button onclick="toggleSatellite()">Satellite</button>
<label style="margin-left:10px;">Jump to date:</label>
<input type="date" id="dateJump">
<button onclick="jumpToDate()">Go</button>
</div>

<div id="map"></div>
<div id="timeline"></div>

<script>

// MAP
let map = L.map('map').setView([54,-106],5)

let road = L.tileLayer(
'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',
{maxZoom:19}
).addTo(map)

let sat = L.tileLayer(
'https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}',
{maxZoom:19}
)

let satellite = false
function toggleSatellite(){
if(satellite){
map.removeLayer(sat)
map.addLayer(road)
satellite=false
}else{
map.removeLayer(road)
map.addLayer(sat)
satellite=true
}
}

// =====================
// LOAD REAL DATA
// =====================

let points = []
let activeMarkers = []
let activeLine = null

fetch("location-history.json")
.then(r=>r.json())
.then(data=>{

data.forEach(item=>{

// ACTIVITY SEGMENTS
if(item.activity){

let s = item.activity.start.replace("geo:","").split(",")
let e = item.activity.end.replace("geo:","").split(",")

let startTime = new Date(item.startTime).getTime()
let endTime = new Date(item.endTime).getTime()

let steps = Math.min(50, Math.max(5, Math.floor((endTime-startTime)/(1000*60*10))))

for(let i=0;i<=steps;i++){

let t = i/steps

points.push({
lat: parseFloat(s[0]) + (parseFloat(e[0])-parseFloat(s[0])) * t,
lon: parseFloat(s[1]) + (parseFloat(e[1])-parseFloat(s[1])) * t,
time: new Date(startTime + (endTime-startTime)*t)
})

}

}

// VISITS (stops)
if(item.visit){

let loc = item.visit.topCandidate.placeLocation.replace("geo:","").split(",")
let startTime = new Date(item.startTime).getTime()

points.push({
lat: parseFloat(loc[0]),
lon: parseFloat(loc[1]),
time: new Date(startTime)
})

}

})

// SORT
points.sort((a,b)=> a.time - b.time)

buildTimeline()

})

// =====================
// ADDRESS CACHE
// =====================

let addressCache = {}

async function getAddress(lat, lon){

let key = lat.toFixed(5)+","+lon.toFixed(5)

if(addressCache[key]) return addressCache[key]

try{
let res = await fetch(
`https://nominatim.openstreetmap.org/reverse?format=json&lat=${lat}&lon=${lon}`
)
let data = await res.json()
let addr = data.display_name || "Unknown location"

addressCache[key] = addr
return addr

}catch{
return "Address unavailable"
}
}

// =====================
// TIMELINE
// =====================

function buildTimeline(){

let t=document.getElementById("timeline")
t.innerHTML=""

points.forEach(p=>{

let d = p.time

let div=document.createElement("div")
div.className="item"

div.innerHTML =
"<b>" + d.toLocaleDateString('en-CA') + "</b><br>" +
d.toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'}) +
"<div class='small'>" +
"Lat: " + p.lat.toFixed(5) + "<br>" +
"Lon: " + p.lon.toFixed(5) + "<br>" +
"Loading address..." +
"</div>"

getAddress(p.lat,p.lon).then(addr=>{
div.querySelector(".small").innerHTML =
"Lat: " + p.lat.toFixed(5) + "<br>" +
"Lon: " + p.lon.toFixed(5) + "<br>" +
addr
})

div.onclick=()=>{

activeMarkers.forEach(m => map.removeLayer(m))
activeMarkers = []

if(activeLine) map.removeLayer(activeLine)

let marker = L.marker([p.lat,p.lon]).addTo(map)
activeMarkers.push(marker)

map.setView([p.lat,p.lon], 13)

}

t.appendChild(div)

})

}

// =====================
// JUMP
// =====================

function jumpToDate(){

let input = document.getElementById("dateJump").value
if(!input) return

let items = document.getElementsByClassName("item")

for(let i=0;i<points.length;i++){

let d = points[i].time.toLocaleDateString('en-CA')

if(d === input){
items[i].scrollIntoView({behavior:"smooth"})
items[i].click()
return
}

}

alert("No data for that date")
}

</script>

</body>
</html>
