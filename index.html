<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>GPS Timeline Viewer</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<style>

body{
margin:0;
font-family:Arial;
display:flex;
flex-direction:column;
height:100vh;
}

#map{
height:55vh;
}

#controls{
padding:10px;
background:#f0f0f0;
border-bottom:1px solid #ccc;
}

#search{
font-size:18px;
padding:6px;
width:200px;
}

button{
font-size:18px;
padding:6px 10px;
margin-left:5px;
}

#list{
height:45vh;
overflow:auto;
padding:12px;
font-size:20px;
}

.segment{
border:1px solid #ccc;
margin-bottom:10px;
padding:12px;
cursor:pointer;
background:white;
}

.segment.active{
background:#dfefff;
border-color:#0077ff;
}

</style>
</head>

<body>

<div id="map"></div>

<div id="controls">
Search date:
<input id="search" placeholder="YYYY-MM-DD">
<button onclick="searchDate()">Go</button>
<button onclick="toggleMap()">Satellite</button>
</div>

<div id="list">Loading timeline…</div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>

const map=L.map('map').setView([52,-105],6);

let street=L.tileLayer(
'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',
{maxZoom:19}
).addTo(map);

let satellite=L.tileLayer(
'https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}',
{maxZoom:19}
);

let currentLayer="street";

let marker;
let line;

function toggleMap(){

if(currentLayer==="street"){
map.removeLayer(street);
satellite.addTo(map);
currentLayer="satellite";
}else{
map.removeLayer(satellite);
street.addTo(map);
currentLayer="street";
}

}

const list=document.getElementById("list");
const segments=[];

fetch("location-history.json")
.then(r=>r.json())
.then(data=>{

list.innerHTML="";

data.forEach((seg,i)=>{

const start=new Date(seg.startTime);
const end=new Date(seg.endTime);

const startCoords=seg.activity.start.replace("geo:","").split(",");
const endCoords=seg.activity.end.replace("geo:","").split(",");

const startLat=parseFloat(startCoords[0]);
const startLng=parseFloat(startCoords[1]);

const endLat=parseFloat(endCoords[0]);
const endLng=parseFloat(endCoords[1]);

const dur=Math.round((end-start)/60000);

const div=document.createElement("div");
div.className="segment";

div.innerHTML=`
<b>${start.toLocaleDateString()}</b><br>
Start: ${start.toLocaleTimeString()}<br>
End: ${end.toLocaleTimeString()}<br>
Duration: ${dur} minutes
`;

div.onclick=()=>{

document.querySelectorAll(".segment")
.forEach(s=>s.classList.remove("active"));

div.classList.add("active");

if(marker)map.removeLayer(marker);
if(line)map.removeLayer(line);

marker=L.marker([startLat,startLng]).addTo(map);

line=L.polyline(
[[startLat,startLng],[endLat,endLng]],
{color:"red"}
).addTo(map);

map.setView([startLat,startLng],15);

};

segments.push({
date:start.toISOString().split("T")[0],
element:div
});

list.appendChild(div);

});

});

function searchDate(){

const value=document.getElementById("search").value;

for(const seg of segments){

if(seg.date===value){

seg.element.scrollIntoView({
behavior:"smooth",
block:"center"
});

seg.element.click();
break;

}

}

}

</script>

</body>
</html>
