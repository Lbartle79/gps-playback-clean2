<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8"/>
<title>GPS Stop Map</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link
  rel="stylesheet"
  href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
/>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
}

#container {
  display: flex;
  height: 100vh;
}

#list {
  width: 40%;
  overflow-y: scroll;
  padding: 20px;
  background: #f4f4f4;
  font-size: 18px;
  line-height: 1.6;
}

.stop {
  padding: 15px;
  margin-bottom: 15px;
  background: white;
  border-radius: 8px;
  cursor: pointer;
  box-shadow: 0 2px 5px rgba(0,0,0,0.1);
}

.stop:hover {
  background: #e6f2ff;
}

#map {
  width: 60%;
  height: 100%;
}
</style>
</head>
<body>

<div id="container">
  <div id="list"></div>
  <div id="map"></div>
</div>

<script>
const map = L.map('map').setView([53.2033, -105.7531], 12);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  attribution: '© OpenStreetMap contributors'
}).addTo(map);

let marker;

function formatDate(d) {
  return new Date(d).toLocaleString();
}

async function reverseGeocode(lat, lng) {
  const res = await fetch(
    `https://nominatim.openstreetmap.org/reverse?format=json&lat=${lat}&lon=${lng}`
  );
  const data = await res.json();
  return data.display_name || "Address not found";
}

fetch('location-history.json')
.then(res => res.json())
.then(async data => {

  const listDiv = document.getElementById('list');

  for (let i = 0; i < data.length; i++) {

    const stop = data[i];
    const lat = stop.latLng[0];
    const lng = stop.latLng[1];

    const address = await reverseGeocode(lat, lng);

    const stopDiv = document.createElement('div');
    stopDiv.className = 'stop';

    stopDiv.innerHTML = `
      <strong>Stop ${i+1}</strong><br>
      Arrival: ${formatDate(stop.arrival)}<br>
      Departure: ${formatDate(stop.departure)}<br>
      Duration: ${stop.duration}<br>
      Address: ${address}
    `;

    stopDiv.onclick = () => {
      if (marker) map.removeLayer(marker);

      marker = L.marker([lat, lng]).addTo(map);

      marker.bindPopup(`
        <strong>Stop ${i+1}</strong><br>
        Arrival: ${formatDate(stop.arrival)}<br>
        Departure: ${formatDate(stop.departure)}<br>
        Duration: ${stop.duration}<br>
        Address: ${address}
      `).openPopup();

      map.setView([lat, lng], 15);
    };

    listDiv.appendChild(stopDiv);
  }

});
</script>

</body>
</html>
