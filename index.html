<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8"/>
<title>GPS Investigation Playback</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<style>
body { margin:0; font-family:Arial; }
#controls { padding:10px; background:#f2f2f2; }
#map { height:60vh; }
#log { height:30vh; overflow:auto; padding:10px; background:white; border-top:1px solid #ccc; font-size:14px;}
button { margin-right:5px; }
</style>
</head>
<body>

<div id="controls">
<select id="daySelect"></select>
<button onclick="startPlayback()">Play</button>
<button onclick="pausePlayback()">Pause</button>
<button onclick="resetPlayback()">Reset</button>
Speed:
<input type="range" id="speed" min="300" max="2000" value="800">
</div>

<div id="map"></div>
<div id="log"></div>

<script>

const TIMEZONE = "America/Regina";

let map = L.map('map').setView([53,-105],7);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{
maxZoom:18
}).addTo(map);

let marker = L.marker([53,-105]).addTo(map);
let polyline = L.polyline([], {color:'blue'}).addTo(map);

let fullData = [];
let currentDayData = [];
let playbackIndex = 0;
let timer = null;

function formatTime(dateStr){
return new Date(dateStr).toLocaleString('en-CA',{
timeZone:TIMEZONE,
year:'numeric',
month:'short',
day:'2-digit',
hour:'numeric',
minute:'2-digit',
hour12:true
});
}

function formatDuration(start,end){
let ms = new Date(end) - new Date(start);
let mins = Math.floor(ms/60000);
let hrs = Math.floor(mins/60);
mins = mins % 60;
return hrs + "h " + mins + "m";
}

fetch('location-history.json')
.then(r=>r.json())
.then(data=>{

fullData = data
.filter(entry => entry.startTime && entry.endTime)
.sort((a,b)=> new Date(a.startTime) - new Date(b.startTime));
.filter(obj=>obj.activitySegment || obj.placeVisit)
.sort((a,b)=> new Date(
(a.activitySegment?.duration?.startTimestampMs ||
a.placeVisit?.duration?.startTimestampMs)
) - new Date(
(b.activitySegment?.duration?.startTimestampMs ||
b.placeVisit?.duration?.startTimestampMs)
));

groupByDay();

});

function groupByDay(){

let days = {};

fullData.forEach(entry=>{

let startMs =
entry.activitySegment?.duration?.startTimestampMs ||
entry.placeVisit?.duration?.startTimestampMs;

let date = new Date(Number(startMs)).toLocaleDateString('en-CA',{timeZone:TIMEZONE});

if(!days[date]) days[date] = [];
days[date].push(entry);

});

let select = document.getElementById("daySelect");

Object.keys(days).forEach(day=>{
let opt = document.createElement("option");
opt.value = day;
opt.textContent = day;
select.appendChild(opt);
});

select.addEventListener("change",()=>{
loadDay(days[select.value]);
});

loadDay(days[Object.keys(days)[0]]);

}

function loadDay(entries){
currentDayData = entries;
resetPlayback();
document.getElementById("log").innerHTML = "";
}

function startPlayback(){
if(timer) return;
timer = setInterval(playStep, document.getElementById("speed").value);
}

function pausePlayback(){
clearInterval(timer);
timer = null;
}

function resetPlayback(){
pausePlayback();
playbackIndex = 0;
polyline.setLatLngs([]);
document.getElementById("log").innerHTML = "";
}

function playStep(){

if(playbackIndex >= currentDayData.length){
pausePlayback();
return;
}

let entry = currentDayData[playbackIndex];

if(entry.placeVisit){

let visit = entry.placeVisit;

let lat = visit.location.latitudeE7 / 1e7;
let lng = visit.location.longitudeE7 / 1e7;

let start = new Date(Number(visit.duration.startTimestampMs)).toISOString();
let end = new Date(Number(visit.duration.endTimestampMs)).toISOString();

marker.setLatLng([lat,lng]);
map.setView([lat,lng],13);

document.getElementById("log").innerHTML +=
"<b>Visit</b><br>" +
"Arrived: " + formatTime(start) + "<br>" +
"Departed: " + formatTime(end) + "<br>" +
"Duration: " + formatDuration(start,end) +
"<hr>";

}

if(entry.activitySegment){

let seg = entry.activitySegment;

let endLat = seg.endLocation.latitudeE7 / 1e7;
let endLng = seg.endLocation.longitudeE7 / 1e7;

let start = new Date(Number(seg.duration.startTimestampMs)).toISOString();
let end = new Date(Number(seg.duration.endTimestampMs)).toISOString();

polyline.addLatLng([endLat,endLng]);
marker.setLatLng([endLat,endLng]);
map.setView([endLat,endLng],12);

document.getElementById("log").innerHTML +=
"<b>Movement</b><br>" +
"Start: " + formatTime(start) + "<br>" +
"End: " + formatTime(end) + "<br>" +
"Duration: " + formatDuration(start,end) +
"<hr>";

}

playbackIndex++;

}

</script>
</body>
</html>
