<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>GPS Segment Viewer</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #f4f4f4;
}

#list {
  height: 45vh;
  overflow-y: scroll;
  padding: 15px;
  background: white;
}

.segment {
  padding: 10px;
  margin-bottom: 10px;
  border-left: 5px solid #007bff;
  background: #fafafa;
  cursor: pointer;
}

.segment:hover {
  background: #e6f0ff;
}

.segment h3 {
  margin: 0 0 5px 0;
  font-size: 16px;
}

.segment p {
  margin: 3px 0;
  font-size: 14px;
}

#map {
  height: 55vh;
}
</style>
</head>
<body>

<div id="list">Loading data...</div>
<div id="map"></div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>

const listContainer = document.getElementById("list");

const map = L.map("map").setView([52.0, -104.0], 6);

L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
  attribution: "© OpenStreetMap contributors"
}).addTo(map);

function formatDuration(start, end) {
  const diff = (new Date(end) - new Date(start)) / 1000;
  const minutes = Math.floor(diff / 60);
  const hours = Math.floor(minutes / 60);
  const remainingMinutes = minutes % 60;

  if (hours > 0) {
    return hours + " hr " + remainingMinutes + " min";
  }
  return minutes + " min";
}

fetch("location-history.json?v=" + new Date().getTime())
  .then(response => response.json())
  .then(data => {

    listContainer.innerHTML = "";
    let markers = [];

    data.forEach((entry, index) => {

      const startGeo = entry.activity?.start?.replace("geo:", "");
      const endGeo = entry.activity?.end?.replace("geo:", "");

      const startTime = entry.startTime;
      const endTime = entry.endTime;
      const duration = formatDuration(startTime, endTime);

      function addPoint(label, geoString) {
        if (!geoString) return;

        const parts = geoString.split(",");
        const lat = parseFloat(parts[0]);
        const lng = parseFloat(parts[1]);

        const segmentDiv = document.createElement("div");
        segmentDiv.className = "segment";

        segmentDiv.innerHTML = `
          <h3>Segment ${index + 1} - ${label}</h3>
          <p><strong>Arrival:</strong> ${new Date(startTime).toLocaleString()}</p>
          <p><strong>Departure:</strong> ${new Date(endTime).toLocaleString()}</p>
          <p><strong>Duration:</strong> ${duration}</p>
          <p><strong>Coordinates:</strong> ${lat}, ${lng}</p>
          <p><a href="https://www.google.com/maps?q=${lat},${lng}" target="_blank">Open in Google Maps</a></p>
        `;

        const marker = L.marker([lat, lng]).addTo(map);
        marker.bindPopup(`
          <strong>Segment ${index + 1} - ${label}</strong><br>
          Arrival: ${new Date(startTime).toLocaleString()}<br>
          Departure: ${new Date(endTime).toLocaleString()}<br>
          Duration: ${duration}<br>
          ${lat}, ${lng}
        `);

        segmentDiv.addEventListener("click", function() {
          map.setView([lat, lng], 15);
          marker.openPopup();
        });

        listContainer.appendChild(segmentDiv);
        markers.push(marker);
      }

      addPoint("Start", startGeo);
      addPoint("End", endGeo);

    });

    if (markers.length > 0) {
      const group = L.featureGroup(markers);
      map.fitBounds(group.getBounds());
    }

  })
  .catch(error => {
    listContainer.innerHTML = "Error loading location-history.json";
    console.error(error);
  });

</script>

</body>
</html>
