<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>GPS Playback</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<style>

body{
margin:0;
font-family:Arial;
}

#controls{
padding:10px;
background:#eee;
}

#map{
height:55vh;
}

#timeline{
height:40vh;
overflow-y:auto;
padding:10px;
background:white;
}

.dayTitle{
font-size:22px;
font-weight:bold;
margin-top:20px;
}

.stop{
padding:10px;
border-bottom:1px solid #ddd;
}

.stop:hover{
background:#f0f0f0;
}

</style>
</head>

<body>

<div id="controls">

Jump to date:
<input type="date" id="dateJump">

<button onclick="jumpToDate()">Go</button>

<button onclick="toggleSatellite()">Satellite</button>

</div>

<div id="map"></div>

<div id="timeline"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>

let map = L.map('map').setView([53,-106],5)

let streetLayer = L.tileLayer(
'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',
{maxZoom:19}
).addTo(map)

let satelliteLayer = L.tileLayer(
'https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}',
{maxZoom:19}
)

let usingSatellite=false

function toggleSatellite(){

if(usingSatellite){
map.removeLayer(satelliteLayer)
map.addLayer(streetLayer)
}else{
map.removeLayer(streetLayer)
map.addLayer(satelliteLayer)
}

usingSatellite=!usingSatellite

}

let bigIcon = L.icon({
iconUrl:'https://unpkg.com/leaflet@1.9.4/dist/images/marker-icon.png',
iconSize:[40,65],
iconAnchor:[20,65],
popupAnchor:[0,-55]
})

let startMarker=null
let endMarker=null
let activeStopMarker=null
let routeLine=null

let stopsByDay={}

function parsePoint(p){

let coords=p.replace("geo:","").split(",")

return[
parseFloat(coords[0]),
parseFloat(coords[1])
]

}

function formatTime(t){

let d=new Date(t)

return d.toLocaleTimeString([],{
hour:'numeric',
minute:'2-digit'
})

}

function addStop(day,coords,start,end){

if(!stopsByDay[day]) stopsByDay[day]=[]

stopsByDay[day].push({
coords:coords,
start:start,
end:end
})

}

fetch('location-history.json')

.then(r=>r.json())

.then(data=>{

data.forEach(item=>{

if(item.activity){

let start=parsePoint(item.activity.start)
let end=parsePoint(item.activity.end)

let day=item.startTime.slice(0,10)

addStop(day,start,item.startTime,item.endTime)
addStop(day,end,item.startTime,item.endTime)

}

})

buildTimeline()

})

function buildTimeline(){

let timeline=document.getElementById("timeline")

timeline.innerHTML=""

Object.keys(stopsByDay).sort().forEach(day=>{

let title=document.createElement("div")
title.className="dayTitle"
title.id="day-"+day
title.innerText=day

title.onclick=()=>loadDay(day)

timeline.appendChild(title)

stopsByDay[day].forEach((stop,i)=>{

let div=document.createElement("div")
div.className="stop"

div.innerHTML=
"Arrival: "+formatTime(stop.start)+"<br>"+
"Departure: "+formatTime(stop.end)

div.onclick=()=>selectStop(day,i)

timeline.appendChild(div)

})

})

}

function loadDay(day){

let stops=stopsByDay[day]

if(!stops) return

if(startMarker) map.removeLayer(startMarker)
if(endMarker) map.removeLayer(endMarker)
if(activeStopMarker) map.removeLayer(activeStopMarker)
if(routeLine) map.removeLayer(routeLine)

let first=stops[0]
let last=stops[stops.length-1]

startMarker=L.marker(first.coords,{icon:bigIcon})
.addTo(map)
.bindPopup("START<br>"+formatTime(first.start))

endMarker=L.marker(last.coords,{icon:bigIcon})
.addTo(map)
.bindPopup("END<br>"+formatTime(last.end))

let routeCoords=stops.map(s=>s.coords)

routeLine=L.polyline(routeCoords,{
color:'blue',
weight:4
}).addTo(map)

let bounds=L.latLngBounds(routeCoords)

map.fitBounds(bounds,{padding:[40,40]})

}

function selectStop(day,index){

let stop=stopsByDay[day][index]

if(activeStopMarker) map.removeLayer(activeStopMarker)

activeStopMarker=L.marker(stop.coords,{icon:bigIcon})
.addTo(map)
.bindPopup(
formatTime(stop.start)+" - "+formatTime(stop.end)
)
.openPopup()

}

function jumpToDate(){

let date=document.getElementById("dateJump").value

if(stopsByDay[date]){

loadDay(date)

let el=document.getElementById("day-"+date)

if(el){

el.scrollIntoView({
behavior:"smooth",
block:"start"
})

}

}else{

alert("No data for this date")

}

}

</script>

</body>
</html>
