<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>GPS Stop Viewer</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<style>

body{
margin:0;
font-family:Arial;
display:flex;
flex-direction:column;
height:100vh;
}

#controls{
padding:15px;
background:#f5f5f5;
font-size:26px;
border-bottom:2px solid #ccc;
}

#list{
height:35vh;
overflow:auto;
padding:20px;
font-size:26px;
line-height:1.5;
background:white;
}

#map{
height:65vh;
}

.stop{
padding:14px;
border-bottom:1px solid #ddd;
cursor:pointer;
}

.stop:hover{
background:#f0f0f0;
}

</style>
</head>

<body>

<div id="controls">
Date:
<input type="date" id="dateInput" style="font-size:22px">
<button onclick="loadStops()" style="font-size:22px">Load</button>
</div>

<div id="list">
<div id="stopList">Select a date and press Load</div>
</div>

<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>

const map = L.map("map").setView([52,-105],7);

L.tileLayer(
"https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}",
{
maxZoom:19,
attribution:"Tiles © Esri"
}
).addTo(map);

let marker=null;

function showStop(lat,lng,text){

if(!marker){
marker=L.marker([lat,lng]).addTo(map);
}else{
marker.setLatLng([lat,lng]);
}

marker.bindPopup(text).openPopup();
map.setView([lat,lng],14);

}

function formatDuration(minutes){

const h=Math.floor(minutes/60);
const m=minutes%60;

if(h===0) return m+" min";
return h+" hr "+m+" min";

}

async function loadStops(){

const selectedDate=document.getElementById("dateInput").value;

if(!selectedDate){
alert("Select a date first");
return;
}

const container=document.getElementById("stopList");
container.innerHTML="Loading stops...";

try{

const response=await fetch("location-history.json");
const data=await response.json();

let stops=[];

data.forEach(segment=>{

if(!segment.startTime) return;

const start=new Date(segment.startTime);
const end=new Date(segment.endTime);

const localDate=start.toISOString().split("T")[0];

if(localDate!==selectedDate) return;

let lat=null;
let lng=null;

if(segment.timelinePath && segment.timelinePath.length>0){

const point=segment.timelinePath[0].point.replace("geo:","");
const parts=point.split(",");

lat=parseFloat(parts[0]);
lng=parseFloat(parts[1]);

}

if(lat===null) return;

const duration=Math.round((end-start)/60000);

stops.push({
lat,lng,start,end,duration
});

});

container.innerHTML="";

let count=0;

stops.forEach(s=>{

count++;

const text=
"<b>Stop "+count+"</b><br>"+
"Arrival: "+s.start.toLocaleString()+"<br>"+
"Departure: "+s.end.toLocaleString()+"<br>"+
"Duration: "+formatDuration(s.duration);

const div=document.createElement("div");
div.className="stop";
div.innerHTML=text;

div.onclick=()=>showStop(s.lat,s.lng,text);

container.appendChild(div);

});

if(stops.length===0){
container.innerHTML="No stops for that date.";
}

}catch(e){

container.innerHTML="Error loading data.";

}

}

</script>

</body>
</html>
