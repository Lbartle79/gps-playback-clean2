<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8"/>
<title>GPS Stop Map</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<style>
body {
    margin:0;
    display:flex;
    font-family:Arial;
}
#sidebar {
    width:40%;
    height:100vh;
    overflow:auto;
    padding:15px;
    background:#f2f2f2;
    box-sizing:border-box;
}
#map {
    width:60%;
    height:100vh;
}
.stop {
    padding:10px;
    border-bottom:1px solid #ccc;
    cursor:pointer;
}
.stop:hover {
    background:#ddd;
}
.leaflet-popup-content {
    font-size:15px;
    line-height:1.6;
}
</style>
</head>
<body>

<div id="sidebar"></div>
<div id="map"></div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>

// ====== PASTE YOUR STOP DATA BELOW THIS LINE ======

// IMPORTANT:
// Replace this sample data with the actual stop array
// I can generate the full embedded stop array for you if needed

const stops = [
    {
        start: "2025-02-09T14:54:00",
        end: "2025-02-09T15:15:00",
        lat: 53.2033,
        lng: -105.7531
    },
    {
        start: "2025-02-09T15:15:00",
        end: "2025-02-11T06:36:00",
        lat: 52.8566,
        lng: -104.6189
    }
];

// ================================================

const map = L.map('map').setView([53.2, -105.7], 7);

L.tileLayer(
  'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',
  { maxZoom: 19 }
).addTo(map);

let marker = null;

function formatTime(d){
    return new Date(d).toLocaleString('en-US');
}

function duration(a,b){
    const diff = (new Date(b)-new Date(a))/1000;
    const h = Math.floor(diff/3600);
    const m = Math.floor((diff%3600)/60);
    return h + "h " + m + "m";
}

const sidebar = document.getElementById("sidebar");

stops.forEach((stop,i)=>{

    const div = document.createElement("div");
    div.className = "stop";

    div.innerHTML =
        "<strong>Stop " + (i+1) + "</strong><br>" +
        "Arrival: " + formatTime(stop.start) + "<br>" +
        "Departure: " + formatTime(stop.end) + "<br>" +
        "Duration: " + duration(stop.start, stop.end) + "<br>" +
        "Lat/Lng: " + stop.lat.toFixed(5) + ", " + stop.lng.toFixed(5);

    div.onclick = function(){

        if(marker){
            map.removeLayer(marker);
        }

        marker = L.marker([stop.lat, stop.lng]).addTo(map);
        map.setView([stop.lat, stop.lng], 14);

        marker.bindPopup(
            "<strong>Stop " + (i+1) + "</strong><br>" +
            "Arrival: " + formatTime(stop.start) + "<br>" +
            "Departure: " + formatTime(stop.end) + "<br>" +
            "Duration: " + duration(stop.start, stop.end) + "<br>" +
            "Lat/Lng: " + stop.lat.toFixed(5) + ", " + stop.lng.toFixed(5)
        ).openPopup();
    };

    sidebar.appendChild(div);
});

</script>

</body>
</html>
