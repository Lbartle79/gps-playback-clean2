<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8" />
<title>GPS Playback Clean</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<style>
body { margin:0; font-family: Arial; }
#controls { padding:10px; background:#f4f4f4; }
#map { height:70vh; }
button, select, input { margin:5px; }
#info { padding:10px; }
</style>
</head>

<body>

<div id="controls">
<label>Day:</label>
<select id="daySelect"></select>

<button onclick="play()">Play</button>
<button onclick="pause()">Pause</button>

<label>Speed:</label>
<input type="range" id="speed" min="1" max="20" value="5">
</div>

<div id="map"></div>

<div id="info">
<h3>Day Analysis</h3>
<div id="summary"></div>
</div>

<script>

/* =======================
   CLEAN DATA STRUCTURE
======================= */

let data = {

  "2026-01-01": [
    { time:"19:57", lat:52.866742, lng:-104.594641 }
  ],

  "2026-01-02": [
    { time:"04:57", lat:52.859961, lng:-104.600857 },

    { time:"06:28", lat:52.215994, lng:-104.506632 },
    { time:"06:30", lat:52.193380, lng:-104.518376 },
    { time:"06:31", lat:52.179263, lng:-104.523217 },
    { time:"06:32", lat:52.174383, lng:-104.523798 },
    { time:"06:33", lat:52.173160, lng:-104.517192 },
    { time:"06:35", lat:52.173158, lng:-104.515588 },
    { time:"06:36", lat:52.173151, lng:-104.509970 },
    { time:"06:37", lat:52.173108, lng:-104.497994 }
  ]

};

/* =======================
   MAP SETUP
======================= */

let map = L.map('map').setView([52.856, -104.617], 10);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  maxZoom: 19
}).addTo(map);

let marker = null;
let polyline = null;
let timer = null;
let currentIndex = 0;
let currentPoints = [];

/* =======================
   LOAD DAY
======================= */

let daySelect = document.getElementById("daySelect");

for (let day in data) {
  let option = document.createElement("option");
  option.value = day;
  option.text = day;
  daySelect.appendChild(option);
}

function loadDay(day) {

  pause();

  currentPoints = data[day];
   currentPoints.sort((a, b) => {
  return new Date("1970-01-01T" + a.time) - 
         new Date("1970-01-01T" + b.time);
});
  currentIndex = 0;

  if (!currentPoints || currentPoints.length === 0) return;

  if (marker) map.removeLayer(marker);
  if (polyline) map.removeLayer(polyline);

  polyline = L.polyline([], {color:'blue'}).addTo(map);

  marker = L.circleMarker(
    [currentPoints[0].lat, currentPoints[0].lng],
    { radius:6, color:'red' }
  ).addTo(map);

  map.fitBounds(
    currentPoints.map(p => [p.lat, p.lng])
  );

  document.getElementById("summary").innerHTML =
    "Total Points: " + currentPoints.length;
}

/* =======================
   PLAY
======================= */

function play() {

  let speed = document.getElementById("speed").value;

  pause();

  timer = setInterval(function() {

    if (currentIndex >= currentPoints.length) {
      pause();
      return;
    }

    let point = currentPoints[currentIndex];

    polyline.addLatLng([point.lat, point.lng]);
    marker.setLatLng([point.lat, point.lng]);

    currentIndex++;

  }, 1000 / speed);
}

/* =======================
   PAUSE
======================= */

function pause() {
  clearInterval(timer);
}

/* =======================
   EVENTS
======================= */

daySelect.addEventListener("change", function() {
  loadDay(this.value);
});

loadDay(daySelect.value);

</script>

</body>
</html>
