<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>

<title>GPS Timeline</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<style>
body { margin:0; font-family:Arial; }

#controls {
padding:10px;
background:#f0f0f0;
border-bottom:1px solid #ccc;
}

#map { height:50vh; }

#timeline {
height:50vh;
overflow-y:auto;
padding:10px;
background:#fafafa;
font-size:18px;
}

.item {
padding:10px;
border-bottom:1px solid #ddd;
cursor:pointer;
}

.item:hover { background:#eee; }
</style>
</head>

<body>

<div id="controls">
<button onclick="toggleSatellite()">Satellite</button>
</div>

<div id="map"></div>
<div id="timeline"></div>

<script>

// MAP
let map = L.map('map').setView([54,-106],5)

let road = L.tileLayer(
'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',
{maxZoom:19}
).addTo(map)

let sat = L.tileLayer(
'https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}',
{maxZoom:19}
)

let satellite = false

function toggleSatellite(){
if(satellite){
map.removeLayer(sat)
map.addLayer(road)
satellite=false
}else{
map.removeLayer(road)
map.addLayer(sat)
satellite=true
}
}

// DATA
let points = []
let activeMarkers = []
let activeLine = null

fetch("location-history.json")
.then(r=>r.json())
.then(json=>{

json.forEach(item=>{

if(item.activity){

let s=item.activity.start.replace("geo:","").split(",")
let e=item.activity.end.replace("geo:","").split(",")

points.push({
lat:parseFloat(s[0]),
lon:parseFloat(s[1]),
time:item.startTime
})

points.push({
lat:parseFloat(e[0]),
lon:parseFloat(e[1]),
time:item.endTime
})

}

})

// SORT
points.sort((a,b)=>new Date(a.time)-new Date(b.time))

buildTimeline()

})

// TIMELINE
function buildTimeline(){

let t=document.getElementById("timeline")

points.forEach(p=>{

let d=new Date(p.time)

// GROUP POINTS BY DAY
let sameDay = points.filter(x =>
new Date(x.time).toDateString() === d.toDateString()
)

// DETERMINE LABEL
let label =
(p === sameDay[0]) ? "Start" :
(p === sameDay[sameDay.length - 1]) ? "Stop" :
"Movement"

// BUILD ITEM
let div=document.createElement("div")
div.className="item"

div.innerHTML =
"<b>" + d.toLocaleDateString() + "</b><br>" +
d.toLocaleTimeString([], {hour:'numeric',minute:'2-digit'}) + "<br>" +
label

// CLICK BEHAVIOR
div.onclick=()=>{

// clear markers
activeMarkers.forEach(m => map.removeLayer(m))
activeMarkers = []

// clear line
if(activeLine){
map.removeLayer(activeLine)
}

// get same day
let dayPoints = sameDay

let latlngs = dayPoints.map(x => [x.lat, x.lon])

// draw route
activeLine = L.polyline(latlngs, {
color:'cyan',
weight:4
}).addTo(map)

// zoom
map.fitBounds(activeLine.getBounds())

// marker
let marker = L.marker([p.lat,p.lon]).addTo(map)
activeMarkers.push(marker)

// scroll up
window.scrollTo({top:0, behavior:"smooth"})

}

t.appendChild(div)

})

}

</script>

</body>
</html>
