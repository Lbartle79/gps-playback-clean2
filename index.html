<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>GPS Map</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<style>
body{margin:0;font-family:Arial;}
#map{height:60vh;}
#timeline{height:40vh;overflow:auto;padding:10px;background:#eee;}
.item{padding:6px;border-bottom:1px solid #ccc;cursor:pointer;}
</style>
</head>

<body>

<div id="map"></div>
<div id="timeline"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>

let map = L.map('map').setView([54,-106],5)

L.tileLayer(
'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',
{maxZoom:19}
).addTo(map)

let points = []

fetch("location-history.json")
.then(res => res.json())
.then(data => {

data.forEach(item => {

if(item.visit){
let p = item.visit.topCandidate.placeLocation.replace("geo:","").split(",")

points.push({
lat:+p[0],
lon:+p[1],
time:new Date(item.startTime),
type:"Stop"
})
}

if(item.activity){
let s = item.activity.start.replace("geo:","").split(",")

points.push({
lat:+s[0],
lon:+s[1],
time:new Date(item.startTime),
type:"Move"
})
}

})

points.sort((a,b)=>a.time-b.time)

// 🔥 DRAW EVERYTHING
let latlngs=[]

points.forEach(p=>{

let ll=[p.lat,p.lon]
latlngs.push(ll)

let color = p.type==="Stop" ? "red" : "blue"

let marker = L.circleMarker(ll,{radius:5,color}).addTo(map)

marker.bindPopup(p.time.toLocaleString())

let div=document.createElement("div")
div.className="item"
div.innerHTML=p.time.toLocaleString()+" - "+p.type

div.onclick=()=>{
map.setView(ll,14)
}

document.getElementById("timeline").appendChild(div)

})

if(latlngs.length>1){
let route=L.polyline(latlngs,{color:"blue"}).addTo(map)
map.fitBounds(route.getBounds())
}

})

.catch(err=>{
console.error("DATA ERROR:",err)
alert("Your JSON is not loading — check filename")
})

</script>

</body>
</html>
