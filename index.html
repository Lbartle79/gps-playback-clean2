<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>GPS Stops</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<style>

body{
margin:0;
font-family:Arial;
display:flex;
flex-direction:column;
height:100vh;
}

/* stop list */

#list{
height:35vh;
overflow:auto;
padding:20px;
font-size:30px;
line-height:1.6;
background:#ffffff;
border-bottom:2px solid #ccc;
}

/* map area */

#map{
height:65vh;
}

/* stop rows */

.stop{
padding:18px;
border-bottom:1px solid #ddd;
cursor:pointer;
font-size:30px;
}

.stop:hover{
background:#f0f0f0;
}

</style>

</head>

<body>

<div id="list">
<b>Stops</b>
<div id="stopList"></div>
</div>

<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>

const map = L.map("map").setView([52,-105],7);

/* stable map tiles */

L.tileLayer(
"https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png",
{
maxZoom:19,
attribution:"© OpenStreetMap"
}).addTo(map);

let marker=null;

function showStop(lat,lng,text){

if(!marker){
marker=L.marker([lat,lng]).addTo(map);
}else{
marker.setLatLng([lat,lng]);
}

marker.bindPopup(text).openPopup();

map.setView([lat,lng],13);

}

async function loadData(){

const response = await fetch("location-history.json");

const data = await response.json();

const container=document.getElementById("stopList");

let count=0;

data.forEach(segment=>{

let geo=null;

if(segment.activity && segment.activity.start){
geo=segment.activity.start;
}

if(!geo && segment.activity && segment.activity.end){
geo=segment.activity.end;
}

if(!geo) return;

geo=geo.replace("geo:","");

const parts=geo.split(",");

const lat=parseFloat(parts[0]);
const lng=parseFloat(parts[1]);

const start=new Date(segment.startTime);
const end=new Date(segment.endTime);

const duration=Math.round((end-start)/60000);

count++;

const text=
"Stop "+count+"<br>"+
"Arrival: "+start.toLocaleString()+"<br>"+
"Departure: "+end.toLocaleString()+"<br>"+
"Duration: "+duration+" minutes";

const div=document.createElement("div");

div.className="stop";

div.innerHTML=text;

div.onclick=()=>showStop(lat,lng,text);

container.appendChild(div);

});

}

loadData();

</script>

</body>
</html>
