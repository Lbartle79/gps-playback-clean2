<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Forensic Location Timeline</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<style>

body{
font-family:Arial;
margin:0;
background:#111;
color:white;
}

#controls{
padding:10px;
background:#222;
position:sticky;
top:0;
z-index:1000;
}

#map{
height:60vh;
}

#timeline{
height:40vh;
overflow-y:scroll;
padding:10px;
background:#000;
}

.dayTitle{
font-size:20px;
margin-top:20px;
color:#66ccff;
cursor:pointer;
}

.entry{
cursor:pointer;
margin:4px 0;
font-size:15px;
}

</style>
</head>

<body>

<div id="controls">

<input id="jumpDate" type="date">
<button onclick="jumpToDate()">Jump To Date</button>

</div>

<div id="map"></div>
<div id="timeline"></div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>

let map = L.map('map').setView([53,-106],6)

L.tileLayer(
'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',
{maxZoom:19}
).addTo(map)

let markers=[]
let dots=[]
let routeLine=null

let days={}
let allPoints=[]

function formatTime(d){

return new Date(d).toLocaleTimeString("en-CA",{
timeZone:"America/Regina",
hour:"numeric",
minute:"2-digit",
hour12:true
})

}

function clearMap(){

markers.forEach(m=>map.removeLayer(m))
dots.forEach(d=>map.removeLayer(d))

markers=[]
dots=[]

if(routeLine) map.removeLayer(routeLine)

}

function addDot(p){

let dot=L.circleMarker(
[p.lat,p.lon],
{
radius:3,
color:"#999",
weight:1,
fillOpacity:0.8
}
).addTo(map)

dots.push(dot)

}

function addMarker(p,color="blue"){

let marker=L.marker(
[p.lat,p.lon],
{
icon: new L.Icon.Default()
}
).addTo(map)

marker.bindPopup(
"<b>"+p.type+"</b><br>"+
formatTime(p.time)+"<br>"+
p.lat+", "+p.lon+
"<br><i>loading address...</i>"
)

fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${p.lat}&lon=${p.lon}`)
.then(r=>r.json())
.then(a=>{

marker.setPopupContent(
"<b>"+p.type+"</b><br>"+
formatTime(p.time)+"<br>"+
p.lat+", "+p.lon+
"<br>"+a.display_name
)

})

markers.push(marker)

}

function showDay(day){

clearMap()

let points=days[day]

let route=[]

points.forEach((p,i)=>{

route.push([p.lat,p.lon])

if(p.type==="breadcrumb"){

addDot(p)

}else{

addMarker(p)

}

})

routeLine=L.polyline(route,{color:"blue",weight:3}).addTo(map)

map.fitBounds(routeLine.getBounds())

}

function jumpToDate(){

let d=document.getElementById("jumpDate").value

if(days[d]){

showDay(d)

document.getElementById(d).scrollIntoView()

}

}

function addPoint(time,lat,lon,type){

let d=new Date(time)

let day=d.toISOString().split("T")[0]

let point={
time:d,
lat:parseFloat(lat),
lon:parseFloat(lon),
type:type,
date:day
}

allPoints.push(point)

}

fetch("location-history.json")
.then(r=>r.json())
.then(data=>{

data.forEach(item=>{

if(item.activity){

let s=item.activity.start.replace("geo:","").split(",")
let e=item.activity.end.replace("geo:","").split(",")

addPoint(item.startTime,s[0],s[1],"movement start")
addPoint(item.endTime,e[0],e[1],"movement end")

}

if(item.visit){

let c=item.visit.topCandidate.placeLocation.replace("geo:","").split(",")

addPoint(item.startTime,c[0],c[1],"visit")

}

if(item.timelinePath){

item.timelinePath.forEach(p=>{

let c=p.point.replace("geo:","").split(",")

addPoint(p.time,c[0],c[1],"breadcrumb")

})
}

})

allPoints.sort((a,b)=>a.time-b.time)

allPoints.forEach(p=>{

if(!days[p.date]) days[p.date]=[]

days[p.date].push(p)

})

buildTimeline()

})

function buildTimeline(){

let t=document.getElementById("timeline")

Object.keys(days).forEach(day=>{

let title=document.createElement("div")
title.className="dayTitle"
title.id=day
title.innerText=day

title.onclick=()=>showDay(day)

t.appendChild(title)

days[day].forEach(p=>{

let e=document.createElement("div")
e.className="entry"

e.innerText=formatTime(p.time)+" — "+p.type

e.onclick=()=>{

map.setView([p.lat,p.lon],14)

}

t.appendChild(e)

})

})

}

</script>

</body>
</html>
