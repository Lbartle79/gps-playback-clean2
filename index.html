<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>GPS Stop Viewer</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<style>

body{
margin:0;
font-family:Arial;
}

#map{
height:55vh;
}

#list{
height:45vh;
overflow:auto;
padding:15px;
font-size:22px;
background:white;
}

.stop{
padding:14px;
border-bottom:1px solid #ccc;
cursor:pointer;
}

.stop:hover{
background:#eee;
}

</style>

</head>

<body>

<div id="map"></div>
<div id="list">Loading stops…</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>

const map=L.map('map').setView([52,-105],6);

L.tileLayer(
'https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}',
{maxZoom:19}
).addTo(map);

let marker;

function showMarker(lat,lng,text){

if(!marker){
marker=L.marker([lat,lng]).addTo(map);
}else{
marker.setLatLng([lat,lng]);
}

marker.bindPopup(text).openPopup();
map.setView([lat,lng],15);

}

function distanceMeters(a,b){

const R=6371000;

let lat1=a.lat*Math.PI/180;
let lat2=b.lat*Math.PI/180;

let dlat=lat2-lat1;
let dlng=(b.lng-a.lng)*Math.PI/180;

let x=
Math.sin(dlat/2)*Math.sin(dlat/2)+
Math.cos(lat1)*Math.cos(lat2)*
Math.sin(dlng/2)*Math.sin(dlng/2);

return 2*R*Math.atan2(Math.sqrt(x),Math.sqrt(1-x));

}

function formatDate(t){

let d=new Date(t);

return d.toLocaleDateString([],{
year:"numeric",
month:"long",
day:"numeric"
});

}

function formatTime(t){

let d=new Date(t);

return d.toLocaleTimeString([],{
hour:"2-digit",
minute:"2-digit",
second:"2-digit"
});

}

function duration(a,b){

let s=Math.floor((b-a)/1000);

let h=Math.floor(s/3600);
let m=Math.floor((s%3600)/60);
let sec=s%60;

let t="";

if(h>0)t+=h+"h ";
if(m>0)t+=m+"m ";

t+=sec+"s";

return t;

}

async function reverseAddress(lat,lng){

try{

let r=await fetch(
"https://nominatim.openstreetmap.org/reverse?format=json&lat="+lat+"&lon="+lng
);

let j=await r.json();

return j.display_name;

}catch{

return lat.toFixed(5)+", "+lng.toFixed(5);

}

}

async function run(){

const r=await fetch("location-history.json");
const data=await r.json();

let points=[];

for(const seg of data){

if(!seg.timelinePath)continue;

let start=new Date(seg.startTime).getTime();

for(const p of seg.timelinePath){

let off=parseInt(p.durationMinutesOffsetFromStartTime||0);

let t=start+off*60000;

let c=p.point.replace("geo:","").split(",");

points.push({
lat:parseFloat(c[0]),
lng:parseFloat(c[1]),
time:t
});

}

}

points.sort((a,b)=>a.time-b.time);

let stops=[];

let cur=null;

for(const p of points){

if(!cur){

cur={
lat:p.lat,
lng:p.lng,
start:p.time,
end:p.time
};

continue;

}

let dist=distanceMeters(cur,p);

if(dist<=10){

cur.end=p.time;

}else{

if((cur.end-cur.start)>=10000){
stops.push(cur);
}

cur={
lat:p.lat,
lng:p.lng,
start:p.time,
end:p.time
};

}

}

const list=document.getElementById("list");

list.innerHTML="";

for(const s of stops){

let addr=await reverseAddress(s.lat,s.lng);

let txt=
"<b>"+addr+"</b><br>"+
"Arrival: "+formatDate(s.start)+" "+formatTime(s.start)+"<br>"+
"Departure: "+formatDate(s.end)+" "+formatTime(s.end)+"<br>"+
"Duration: "+duration(s.start,s.end);

let div=document.createElement("div");

div.className="stop";
div.innerHTML=txt;

div.onclick=()=>{
showMarker(s.lat,s.lng,txt);
};

list.appendChild(div);

}

}

run();

</script>

</body>
</html>
