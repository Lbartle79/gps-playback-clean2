<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>GPS Timeline Viewer</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<style>

body{
margin:0;
font-family:Arial;
display:flex;
flex-direction:column;
height:100vh;
}

#controls{
padding:15px;
background:#f5f5f5;
font-size:24px;
border-bottom:2px solid #ccc;
}

#list{
height:35vh;
overflow:auto;
padding:15px;
font-size:22px;
background:white;
}

#map{
height:65vh;
}

.stop{
padding:10px;
border-bottom:1px solid #ddd;
cursor:pointer;
}

.stop:hover{
background:#eee;
}

</style>
</head>

<body>

<div id="controls">
Date:
<input type="date" id="dateInput" style="font-size:20px">
<button onclick="loadData()" style="font-size:20px">Load</button>
</div>

<div id="list">
<div id="stopList">Choose a date and press Load</div>
</div>

<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>

const map = L.map("map").setView([52,-105],7);

L.tileLayer(
"https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}",
{
maxZoom:19,
attribution:"Satellite © Esri"
}
).addTo(map);

let marker=null;

function showPoint(lat,lng,text){

if(!marker){
marker=L.marker([lat,lng]).addTo(map);
}else{
marker.setLatLng([lat,lng]);
}

marker.bindPopup(text).openPopup();

map.setView([lat,lng],14);

}

function loadData(){

const selectedDate=document.getElementById("dateInput").value;

if(!selectedDate){
alert("Select a date first");
return;
}

const container=document.getElementById("stopList");
container.innerHTML="Loading data...";

fetch("location-history.json")
.then(r=>r.json())
.then(data=>{

let count=0;

container.innerHTML="";

data.forEach(segment=>{

if(!segment.startTime) return;

const date=new Date(segment.startTime).toISOString().split("T")[0];

if(date!==selectedDate) return;

if(!segment.timelinePath) return;

segment.timelinePath.forEach(point=>{

const coords=point.point.replace("geo:","").split(",");

const lat=parseFloat(coords[0]);
const lng=parseFloat(coords[1]);

count++;

const text=
"<b>Point "+count+"</b><br>"+
"Lat: "+lat+"<br>"+
"Lng: "+lng+"<br>"+
"Time: "+segment.startTime;

const div=document.createElement("div");

div.className="stop";
div.innerHTML=text;

div.onclick=()=>showPoint(lat,lng,text);

container.appendChild(div);

});

});

if(count===0){
container.innerHTML="No data for that date.";
}

});

}

</script>
</body>
</html>
