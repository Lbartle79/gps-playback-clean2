
<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8"/>
<title>GPS Playback</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<style>
body { margin:0; font-family:Arial; }
#controls { padding:10px; background:#f0f0f0; }
#map { height:60vh; }
#log { padding:10px; }
</style>
</head>
<body>

<div id="controls">
<select id="daySelect"></select>
<button onclick="startPlayback()">Play</button>
<button onclick="pausePlayback()">Pause</button>
<button onclick="resetPlayback()">Reset</button>
Speed:
<input type="range" id="speed" min="100" max="2000" value="800">
</div>

<div id="map"></div>
<div id="log"></div>

<script>

const TIMEZONE = "America/Regina";

let map = L.map('map').setView([53,-105], 7);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{
    maxZoom:18
}).addTo(map);

let marker = L.marker([53,-105]).addTo(map);
let polyline = L.polyline([], {color:'blue'}).addTo(map);

let fullData = [];
let currentDayData = [];
let playbackIndex = 0;
let timer = null;

function formatTime(dateStr){
    return new Date(dateStr).toLocaleString("en-CA",{
        timeZone:TIMEZONE,
        year:'numeric',
        month:'short',
        day:'2-digit',
        hour:'numeric',
        minute:'2-digit',
        hour12:true
    });
}

function formatDuration(start,end){
    let diff = (new Date(end) - new Date(start))/60000;
    let h = Math.floor(diff/60);
    let m = Math.floor(diff%60);
    return h+"h "+m+"m";
}

function groupByDay(data){
    let grouped = {};
    data.forEach(entry=>{
        let date = new Date(entry.startTime).toLocaleDateString("en-CA",{timeZone:TIMEZONE});
        if(!grouped[date]) grouped[date]=[];
        grouped[date].push(entry);
    });
    return grouped;
}

function loadDay(day){
    pausePlayback();
    playbackIndex=0;
    polyline.setLatLngs([]);
    document.getElementById("log").innerHTML="";

    currentDayData = fullData[day] || [];

    if(currentDayData.length>0){
        let first = currentDayData[0];
        moveMarker(first);
        showStops(day);
    }
}

function moveMarker(entry){

    let lat=null;
    let lng=null;

    if(entry.activity && entry.activity.end){
        let coords = entry.activity.end.replace("geo:","").split(",");
        lat=parseFloat(coords[0]);
        lng=parseFloat(coords[1]);
    }

    if(entry.visit && entry.visit.point){
        let coords = entry.visit.point.replace("geo:","").split(",");
        lat=parseFloat(coords[0]);
        lng=parseFloat(coords[1]);
    }

    if(lat!==null && lng!==null){
        marker.setLatLng([lat,lng]);
        map.setView([lat,lng],12);
        polyline.addLatLng([lat,lng]);
    }
}

function playStep(){
    if(playbackIndex>=currentDayData.length){
        pausePlayback();
        return;
    }

    let entry=currentDayData[playbackIndex];
    moveMarker(entry);

    playbackIndex++;
}

function startPlayback(){
    if(timer) return;
    let speed=document.getElementById("speed").value;
    timer=setInterval(playStep,speed);
}

function pausePlayback(){
    clearInterval(timer);
    timer=null;
}

function resetPlayback(){
    pausePlayback();
    playbackIndex=0;
    polyline.setLatLngs([]);
    document.getElementById("log").innerHTML="";
}

function showStops(day){
    let html="";
    currentDayData.forEach(entry=>{
        if(entry.startTime && entry.endTime){
            html+=`
            <div>
            <b>Start:</b> ${formatTime(entry.startTime)}<br>
            <b>End:</b> ${formatTime(entry.endTime)}<br>
            <b>Duration:</b> ${formatDuration(entry.startTime,entry.endTime)}
            </div><hr>`;
        }
    });
    document.getElementById("log").innerHTML=html;
}

fetch("location-history.json")
.then(r=>r.json())
.then(data=>{
    fullData = groupByDay(data);
    let select=document.getElementById("daySelect");

    Object.keys(fullData).sort().forEach(day=>{
        let opt=document.createElement("option");
        opt.value=day;
        opt.textContent=day;
        select.appendChild(opt);
    });

    select.onchange=()=>loadDay(select.value);
    loadDay(select.value);
});

</script>
</body>
</html>
