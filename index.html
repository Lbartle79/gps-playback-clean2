<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>GPS Stop Viewer</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<style>

body{
margin:0;
font-family:Arial, sans-serif;
display:flex;
height:100vh;
}

/* stop list panel */

#list{
width:420px;
overflow:auto;
border-right:2px solid #ccc;
padding:20px;
font-size:26px;
line-height:1.6;
background:#ffffff;
}

/* map panel */

#map{
flex:1;
height:100vh;
}

/* stop rows */

.stop{
padding:18px;
border-bottom:1px solid #ddd;
cursor:pointer;
font-size:26px;
}

.stop:hover{
background:#f0f0f0;
}

</style>

</head>

<body>

<div id="list">
<h2>Stops</h2>
<div id="stopList"></div>
</div>

<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>

const map = L.map("map").setView([52.1,-104.5],8);

/* satellite imagery */

const satellite = L.tileLayer(
"https://services.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}",
{
maxZoom:19,
attribution:"Tiles © Esri"
}).addTo(map);

/* town labels */

const labels = L.tileLayer(
"https://services.arcgisonline.com/ArcGIS/rest/services/Reference/World_Boundaries_and_Places/MapServer/tile/{z}/{y}/{x}",
{
maxZoom:19
}).addTo(map);

let marker=null;

function showStop(lat,lng,text){

if(!marker){
marker=L.marker([lat,lng]).addTo(map);
}else{
marker.setLatLng([lat,lng]);
}

marker.bindPopup(text).openPopup();

map.setView([lat,lng],13);

}

async function loadData(){

const response = await fetch("location-history.json");

const data = await response.json();

const container=document.getElementById("stopList");

let count=0;

data.forEach(segment=>{

let geo=null;

if(segment.activity && segment.activity.start){
geo=segment.activity.start;
}

if(!geo && segment.activity && segment.activity.end){
geo=segment.activity.end;
}

if(!geo) return;

geo=geo.replace("geo:","");

const parts=geo.split(",");

const lat=parseFloat(parts[0]);
const lng=parseFloat(parts[1]);

const start=new Date(segment.startTime);
const end=new Date(segment.endTime);

const duration=Math.round((end-start)/60000);

count++;

const text=
"<b>Stop "+count+"</b><br>"+
"Arrival: "+start.toLocaleString()+"<br>"+
"Departure: "+end.toLocaleString()+"<br>"+
"Duration: "+duration+" minutes<br>"+
lat+", "+lng;

const div=document.createElement("div");

div.className="stop";

div.innerHTML=text;

div.onclick=()=>showStop(lat,lng,text);

container.appendChild(div);

});

}

loadData();

</script>

</body>
</html>
