<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8"/>
<title>GPS Playback</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<style>
body { margin:0; font-family:Arial; }
#controls { padding:10px; background:#f2f2f2; }
#map { height:60vh; }
#log { height:30vh; overflow:auto; padding:10px; background:white; border-top:1px solid #ccc; font-size:14px;}
button { margin-right:5px; }
</style>
</head>
<body>

<div id="controls">
<select id="daySelect"></select>
<button onclick="startPlayback()">Play</button>
<button onclick="pausePlayback()">Pause</button>
<button onclick="resetPlayback()">Reset</button>
Speed:
<input type="range" id="speed" min="300" max="2000" value="800">
</div>

<div id="map"></div>
<div id="log"></div>

<script>

const TIMEZONE = "America/Regina";

let map = L.map('map').setView([53,-105],7);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{
maxZoom:18
}).addTo(map);

let marker = L.marker([53,-105]).addTo(map);
let polyline = L.polyline([], {color:'blue'}).addTo(map);

let fullData = [];
let currentDayData = [];
let playbackIndex = 0;
let timer = null;

function formatTime(dateStr){
return new Date(dateStr).toLocaleString('en-CA',{
timeZone:TIMEZONE,
year:'numeric',
month:'short',
day:'2-digit',
hour:'numeric',
minute:'2-digit',
hour12:true
});
}

function formatDuration(start,end){
let ms = new Date(end) - new Date(start);
let mins = Math.floor(ms/60000);
let hrs = Math.floor(mins/60);
mins = mins % 60;
return hrs + "h " + mins + "m";
}

fetch('location-history.json')
.then(r=>r.json())
.then(data=>{

fullData = data
.filter(entry => entry.startTime && entry.endTime)
.sort((a,b)=> new Date(a.startTime) - new Date(b.startTime));

groupByDay();

});

function groupByDay(){

let days = {};

fullData.forEach(entry=>{

let localDate = new Date(entry.startTime)
.toLocaleDateString('en-CA',{timeZone:TIMEZONE});

if(!days[localDate]) days[localDate] = [];
days[localDate].push(entry);

});

let select = document.getElementById("daySelect");
select.innerHTML = "";

Object.keys(days).forEach(day=>{
let opt = document.createElement("option");
opt.value = day;
opt.textContent = day;
select.appendChild(opt);
});

select.addEventListener("change",()=>{
loadDay(days[select.value]);
});

loadDay(days[Object.keys(days)[0]]);

}

function loadDay(entries){
currentDayData = entries;
resetPlayback();
}

function startPlayback(){
if(timer) return;
timer = setInterval(playStep, document.getElementById("speed").value);
}

function pausePlayback(){
clearInterval(timer);
timer = null;
}

function resetPlayback(){
pausePlayback();
playbackIndex = 0;
polyline.setLatLngs([]);
document.getElementById("log").innerHTML = "";
}

function playStep(){

if(playbackIndex >= currentDayData.length){
pausePlayback();
return;
}

let entry = currentDayData[playbackIndex];
let lat = null;
let lng = null;

if(entry.timelinePath && entry.timelinePath.length > 0){
    let geoString = entry.timelinePath[0].point; // "geo:52.866742,-104.594641"
    let coords = geoString.replace("geo:","").split(",");
    lat = parseFloat(coords[0]);
    lng = parseFloat(coords[1]);
}

if(lat && lng){
marker.setLatLng([lat,lng]);
map.setView([lat,lng],12);
polyline.addLatLng([lat,lng]);
}


document.getElementById("log").innerHTML +=
"<b>Start:</b> " + formatTime(entry.startTime) + "<br>" +
"<b>End:</b> " + formatTime(entry.endTime) + "<br>" +
"<b>Duration:</b> " + formatDuration(entry.startTime, entry.endTime) +
"<hr>";

playbackIndex++;

}

</script>
</body>
</html>
