<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>

<title>GPS Parking Stops (Full)</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<style>
body { margin:0; font-family:Arial; }

#controls {
position: fixed;
top: 0;
left: 0;
width: 100%;
z-index: 9999;
padding:10px;
background:#f0f0f0;
border-bottom:1px solid #ccc;
}

#map {
height:50vh;
margin-top:70px;
}

#timeline {
height:50vh;
overflow-y:auto;
padding:10px;
background:#fafafa;
}

.item {
padding:10px;
border-bottom:1px solid #ddd;
cursor:pointer;
}

.item:hover { background:#eee; }
</style>
</head>

<body>

<div id="controls">
<h3>GPS PARKING STOPS (ARRIVAL / DEPARTURE)</h3>
</div>

<div id="map"></div>
<div id="timeline"></div>

<script>

// MAP
let map = L.map('map').setView([52.86,-104.60],13)

L.tileLayer(
'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',
{maxZoom:19}
).addTo(map)

let activeMarkers = []

// 🔥 SAMPLE STRUCTURE (REAL DATA WILL REPLACE THIS NEXT)
let points = [

{lat:52.859829, lon:-104.600945, start:"2025-09-19T00:12:00Z", end:"2025-09-19T01:10:00Z"},
{lat:52.859829, lon:-104.600945, start:"2025-09-19T01:10:00Z", end:"2025-09-19T01:16:00Z"},
{lat:52.859850, lon:-104.600980, start:"2025-09-19T01:16:00Z", end:"2025-09-19T01:23:00Z"}

]

// SORT
points.sort((a,b)=> new Date(a.start) - new Date(b.start))

let t=document.getElementById("timeline")

points.forEach(p=>{

// FIX TIME (Saskatchewan UTC-6)
let start = new Date(new Date(p.start).getTime() - (6 * 60 * 60 * 1000))
let end = new Date(new Date(p.end).getTime() - (6 * 60 * 60 * 1000))

let durationMin = Math.floor((new Date(p.end) - new Date(p.start)) / 60000)

let div=document.createElement("div")
div.className="item"

div.innerHTML =
"<b>" + start.toLocaleDateString('en-CA') + "</b><br>" +
"Arrived: " + start.toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'}) + "<br>" +
"Left: " + end.toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'}) + "<br>" +
"Stayed: " + durationMin + " min<br>" +
"Lat: " + p.lat.toFixed(5) + "<br>" +
"Lon: " + p.lon.toFixed(5)

div.onclick=()=>{

activeMarkers.forEach(m => map.removeLayer(m))
activeMarkers=[]

let marker = L.marker([p.lat,p.lon]).addTo(map)
activeMarkers.push(marker)

map.setView([p.lat,p.lon],16)

}

t.appendChild(div)

})
</script>

</body>
</html>
