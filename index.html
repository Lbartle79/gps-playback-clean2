<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>

<title>Location Timeline Map</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<style>
body { margin:0; font-family:Arial; }

#controls {
padding:10px;
background:#f0f0f0;
border-bottom:1px solid #ccc;
}

#map { height:60vh; }

#timeline {
height:40vh;
overflow-y:auto;
padding:10px;
background:#fafafa;
}

.item {
padding:8px;
border-bottom:1px solid #ddd;
cursor:pointer;
}

.item:hover { background:#eee; }

button { margin-right:6px; }
</style>
</head>

<body>

<div id="controls">
<button onclick="playTimeline()">Play</button>
<button onclick="pauseTimeline()">Pause</button>
<button onclick="toggleSatellite()">Satellite</button>

<label style="margin-left:10px;">Jump to date:</label>
<input type="date" id="dateJump">
<button onclick="jumpToDate()">Go</button>
</div>

<div id="map"></div>
<div id="timeline"></div>

<script>

let map=L.map('map').setView([54,-106],5)

let road=L.tileLayer(
'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',
{maxZoom:19}
).addTo(map)

let sat=L.tileLayer(
'https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}',
{maxZoom:19}
)

let satellite=false

function toggleSatellite(){
if(satellite){
map.removeLayer(sat)
map.addLayer(road)
satellite=false
}else{
map.removeLayer(road)
map.addLayer(sat)
satellite=true
}
}

let points=[]

fetch("location-history.json")
.then(r=>r.json())
.then(json=>{

json.forEach(item=>{

if(item.activity){

let s=item.activity.start.replace("geo:","").split(",")
let e=item.activity.end.replace("geo:","").split(",")

points.push({
type:"Start",
lat:parseFloat(s[0]),
lon:parseFloat(s[1]),
time:item.startTime
})

points.push({
type:"End",
lat:parseFloat(e[0]),
lon:parseFloat(e[1]),
time:item.endTime
})

}

})

points.sort((a,b)=>new Date(a.time)-new Date(b.time))

buildTimeline()

})

function buildTimeline(){

let t=document.getElementById("timeline")

points.forEach((p,i)=>{

let d=new Date(p.time)

let div=document.createElement("div")
div.className="item"

div.innerHTML=
d.toLocaleDateString()+" "+
d.toLocaleTimeString([], {hour:'numeric',minute:'2-digit'})+
"<br>"+p.type

div.onclick=()=>{
map.panTo([p.lat,p.lon])
L.marker([p.lat,p.lon]).addTo(map)
}

t.appendChild(div)

})

}

let playTimer=null
let playIndex=0

function playTimeline(){

playTimer=setInterval(()=>{

if(playIndex>=points.length){
clearInterval(playTimer)
return
}

let p=points[playIndex]

map.panTo([p.lat,p.lon])
L.circleMarker([p.lat,p.lon],{radius:6}).addTo(map)

playIndex++

},800)

}

function pauseTimeline(){
clearInterval(playTimer)
}

function jumpToDate(){

let input=document.getElementById("dateJump").value
if(!input) return

let target=new Date(input)

let items=document.getElementsByClassName("item")

for(let i=0;i<points.length;i++){

let d=new Date(points[i].time)

if(
d.getFullYear()===target.getFullYear() &&
d.getMonth()===target.getMonth() &&
d.getDate()===target.getDate()
){

map.panTo([points[i].lat,points[i].lon])
L.marker([points[i].lat,points[i].lon]).addTo(map)

if(items[i]){
items[i].scrollIntoView({behavior:"smooth"})
}

break

}

}

}

</script>

</body>
</html>
