<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>

<title>GPS Timeline (Stable)</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<style>
body { margin:0; font-family:Arial; }
#controls { padding:10px; background:#f0f0f0; border-bottom:1px solid #ccc; }
#map { height:50vh; }
#timeline { height:50vh; overflow-y:auto; padding:10px; background:#fafafa; }
.item { padding:10px; border-bottom:1px solid #ddd; cursor:pointer; }
.item:hover { background:#eee; }
</style>
</head>

<body>

<div id="controls">
<button onclick="toggleSatellite()">Satellite</button>

<label style="margin-left:10px;">Jump to date:</label>
<input type="date" id="dateJump">
<button onclick="jumpToDate()">Go</button>
</div>

<div id="map"></div>
<div id="timeline"></div>

<script>

// MAP
let map = L.map('map').setView([54,-106],5)

let road = L.tileLayer(
'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',
{maxZoom:19}
).addTo(map)

let sat = L.tileLayer(
'https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}',
{maxZoom:19}
)

let satellite = false
function toggleSatellite(){
if(satellite){
map.removeLayer(sat)
map.addLayer(road)
satellite=false
}else{
map.removeLayer(road)
map.addLayer(sat)
satellite=true
}
}

// DATA
let points = []
let activeMarkers = []
let activeLine = null

fetch("location-history.json")
.then(r=>r.json())
.then(json=>{

json.forEach(item=>{

// SAFE timestamp helper
function getTime(obj, key1, key2){
if(obj[key1]) return parseInt(obj[key1])
if(obj[key2]) return new Date(obj[key2]).getTime()
return null
}

// ACTIVITY
if(item.activity){

let s=item.activity.start.replace("geo:","").split(",")
let e=item.activity.end.replace("geo:","").split(",")

let startTime = getTime(item, "startTimestampMs", "startTime")
let endTime   = getTime(item, "endTimestampMs", "endTime")

if(startTime && endTime){

points.push({
lat:parseFloat(s[0]),
lon:parseFloat(s[1]),
time:startTime
})

points.push({
lat:parseFloat(e[0]),
lon:parseFloat(e[1]),
time:endTime
})

}

}

// VISITS
if(item.visit){

let p=item.visit.topCandidate.placeLocation
.replace("geo:","")
.split(",")

let startTime = getTime(item, "startTimestampMs", "startTime")

if(startTime){
points.push({
lat:parseFloat(p[0]),
lon:parseFloat(p[1]),
time:startTime
})
}

}

})

// SORT CORRECTLY
points.sort((a,b)=>a.time - b.time)

buildTimeline()

})

// JUMP (fixed)
function jumpToDate(){

let input = document.getElementById("dateJump").value
if(!input) return

let items = document.getElementsByClassName("item")

for(let i=0;i<points.length;i++){

let d = new Date(points[i].time)
let localDate = d.toLocaleDateString('en-CA')

if(localDate === input){

items[i].scrollIntoView({behavior:"smooth"})
items[i].click()
return
}

}

alert("No data for that date")
}

// TIMELINE
function buildTimeline(){

let t=document.getElementById("timeline")

points.forEach(p=>{

let d = new Date(p.time)

let dateStr = d.toLocaleDateString('en-CA')
let timeStr = d.toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'})

// GROUP
let sameDay = points.filter(x =>
new Date(x.time).toLocaleDateString('en-CA') === dateStr
)

let label =
(p === sameDay[0]) ? "Start" :
(p === sameDay[sameDay.length - 1]) ? "Stop" :
"Movement"

let div=document.createElement("div")
div.className="item"

div.innerHTML =
"<b>" + dateStr + "</b><br>" +
timeStr + "<br>" +
label

div.onclick=()=>{

activeMarkers.forEach(m => map.removeLayer(m))
activeMarkers = []

if(activeLine){
map.removeLayer(activeLine)
}

let latlngs = []

for(let i = 0; i < sameDay.length - 1; i++){

let a = sameDay[i]
let b = sameDay[i+1]

let timeDiff = (b.time - a.time) / 1000
if(timeDiff <= 0) continue

let distance = map.distance([a.lat,a.lon],[b.lat,b.lon])
let speed = distance / timeDiff

if(speed > 50) continue
if(distance > 20000) continue

latlngs.push([a.lat,a.lon])
latlngs.push([b.lat,b.lon])
}

if(latlngs.length > 1){
activeLine = L.polyline(latlngs, {
color:'cyan',
weight:4
}).addTo(map)

map.fitBounds(activeLine.getBounds())
}

let marker = L.marker([p.lat,p.lon]).addTo(map)
activeMarkers.push(marker)

}

t.appendChild(div)

})

}

</script>

</body>
</html>
