<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Location Timeline Map</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<style>

body{
font-family:Arial;
margin:0;
background:#111;
color:white;
}

#map{
height:60vh;
}

#timeline{
height:40vh;
overflow-y:auto;
padding:10px;
background:black;
}

.dayTitle{
font-size:20px;
color:#66ccff;
margin-top:20px;
cursor:pointer;
}

.entry{
margin:4px 0;
cursor:pointer;
}

</style>
</head>

<body>

<div id="map"></div>
<div id="timeline"></div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>

let map = L.map('map').setView([53,-106],6)

L.tileLayer(
'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',
{maxZoom:19}
).addTo(map)

let markers=[]
let dots=[]
let routeLine=null

let allPoints=[]
let days={}

function clearMap(){

markers.forEach(m=>map.removeLayer(m))
dots.forEach(d=>map.removeLayer(d))

markers=[]
dots=[]

if(routeLine) map.removeLayer(routeLine)

}

function formatTime(t){

return new Date(t).toLocaleTimeString("en-CA",{
timeZone:"America/Regina",
hour:"numeric",
minute:"2-digit",
hour12:true
})

}

function addPoint(time,lat,lon,type){

let d=new Date(time)

let day=d.toISOString().split("T")[0]

let p={
time:d,
lat:parseFloat(lat),
lon:parseFloat(lon),
type:type,
date:day
}

allPoints.push(p)

}

function addDot(p){

let dot=L.circleMarker(
[p.lat,p.lon],
{radius:3,color:"#aaa"}
).addTo(map)

dots.push(dot)

}

function addMarker(p){

let marker=L.marker([p.lat,p.lon]).addTo(map)

marker.bindPopup(
p.type+"<br>"+formatTime(p.time)
)

markers.push(marker)

}

function showDay(day){

clearMap()

let pts=days[day]

let route=[]

pts.forEach(p=>{

route.push([p.lat,p.lon])

if(p.type==="breadcrumb"){
addDot(p)
}else{
addMarker(p)
}

})

routeLine=L.polyline(route,{color:"blue"}).addTo(map)

map.fitBounds(routeLine.getBounds())

}

function buildTimeline(){

let t=document.getElementById("timeline")

Object.keys(days).forEach(day=>{

let title=document.createElement("div")
title.className="dayTitle"
title.innerText=day

title.onclick=()=>showDay(day)

t.appendChild(title)

days[day].forEach(p=>{

let e=document.createElement("div")
e.className="entry"

e.innerText=formatTime(p.time)+" — "+p.type

e.onclick=()=>{

map.setView([p.lat,p.lon],14)

}

t.appendChild(e)

})

})

}

fetch("location-history.json")
.then(r=>r.json())
.then(data=>{

data.timelineObjects.forEach(item=>{

if(item.activity){

let s=item.activity.start.replace("geo:","").split(",")
let e=item.activity.end.replace("geo:","").split(",")

addPoint(item.startTime,s[0],s[1],"movement start")
addPoint(item.endTime,e[0],e[1],"movement end")

}

if(item.visit){

let c=item.visit.topCandidate.placeLocation.replace("geo:","").split(",")

addPoint(item.startTime,c[0],c[1],"visit")

}

if(item.timelinePath){

item.timelinePath.forEach(p=>{

let c=p.point.replace("geo:","").split(",")

let t=p.time || item.startTime

addPoint(t,c[0],c[1],"breadcrumb")

})

}

})

allPoints.sort((a,b)=>a.time-b.time)

allPoints.forEach(p=>{

if(!days[p.date]) days[p.date]=[]

days[p.date].push(p)

})

buildTimeline()

})

</script>

</body>
</html>
