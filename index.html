<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>GPS Stop Map</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<style>

body{
margin:0;
font-family:Arial;
display:flex;
height:100vh;
}

#list{
width:420px;
overflow:auto;
border-right:2px solid #ccc;
padding:15px;
font-size:16px;
}

#map{
flex:1;
}

.stop{
padding:10px;
border-bottom:1px solid #ddd;
cursor:pointer;
}

.stop:hover{
background:#f0f0f0;
}

h2{
margin-top:0;
}

</style>

</head>

<body>

<div id="list">
<h2>Stops</h2>
<div id="stopList"></div>
</div>

<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>

const map = L.map('map').setView([52.1,-104.5],18);

const satellite = L.tileLayer(
'https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}',
{ attribution:'Tiles © Esri' }
).addTo(map);

const labels = L.tileLayer(
'https://services.arcgisonline.com/ArcGIS/rest/services/Reference/World_Boundaries_and_Places/MapServer/tile/{z}/{y}/{x}'
).addTo(map);

let marker = null;

function showStop(lat,lng,text){

if(!marker){
marker = L.marker([lat,lng]).addTo(map);
}else{
marker.setLatLng([lat,lng]);
}

marker.bindPopup(text).openPopup();
map.setView([lat,lng],13);

}

async function loadData(){

const response = await fetch("location-history.json");
const data = await response.json();

const container = document.getElementById("stopList");

data.forEach((segment,i)=>{

if(!segment.activity) return;

const startGeo = segment.activity.start?.replace("geo:","");
const endGeo = segment.activity.end?.replace("geo:","");

const startTime = new Date(segment.startTime);
const endTime = new Date(segment.endTime);

const duration = Math.round((endTime-startTime)/60000);

function createStop(label,geo){

if(!geo) return;

const parts = geo.split(",");
const lat = parseFloat(parts[0]);
const lng = parseFloat(parts[1]);

const div = document.createElement("div");
div.className="stop";

const text =
"<b>Segment "+(i+1)+" "+label+"</b><br>"+
"Arrival: "+startTime.toLocaleString()+"<br>"+
"Departure: "+endTime.toLocaleString()+"<br>"+
"Duration: "+duration+" minutes<br>"+
lat+", "+lng;

div.innerHTML=text;

div.onclick=()=>showStop(lat,lng,text);

container.appendChild(div);

}

createStop("Start",startGeo);
createStop("End",endGeo);

});

}

loadData();

</script>

</body>
</html>
