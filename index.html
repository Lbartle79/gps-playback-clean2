<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>GPS Stop Viewer</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<style>
body{
margin:0;
font-family:Arial;
display:flex;
flex-direction:column;
height:100vh;
}

#map{
height:60vh;
}

#list{
height:40vh;
overflow:auto;
font-size:22px;
padding:10px;
background:white;
border-top:2px solid #ccc;
}

.stop{
padding:10px;
border-bottom:1px solid #ddd;
cursor:pointer;
}

.stop:hover{
background:#f0f0f0;
}
</style>

</head>

<body>

<div id="map"></div>
<div id="list">Loading stops...</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>

const map = L.map('map').setView([52,-105],7);

L.tileLayer(
'https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}',
{
maxZoom:19,
attribution:'Satellite © Esri'
}
).addTo(map);

let marker=null;

function showMarker(lat,lng,text){

if(!marker){
marker=L.marker([lat,lng]).addTo(map);
}else{
marker.setLatLng([lat,lng]);
}

marker.bindPopup(text).openPopup();

map.setView([lat,lng],14);
}

function duration(start,end){

let ms=end-start;

let mins=Math.floor(ms/60000);

let h=Math.floor(mins/60);
let m=mins%60;

if(h===0) return m+" min";

return h+" hr "+m+" min";
}

async function reverseAddress(lat,lng){

try{

const r=await fetch(
"https://nominatim.openstreetmap.org/reverse?format=json&lat="+lat+"&lon="+lng
);

const j=await r.json();

return j.display_name;

}catch{

return lat+", "+lng;

}

}

async function loadStops(){

const res=await fetch("location-history.json");

const data=await res.json();

const list=document.getElementById("list");

list.innerHTML="";

for(const seg of data){

if(!seg.timelinePath || seg.timelinePath.length===0) continue;

const coords=seg.timelinePath[0].point.replace("geo:","").split(",");

const lat=parseFloat(coords[0]);
const lng=parseFloat(coords[1]);

const start=new Date(seg.startTime);
const end=new Date(seg.endTime);

const address=await reverseAddress(lat,lng);

const text=
"<b>"+address+"</b><br>"+
"Arrival: "+start.toLocaleString()+"<br>"+
"Departure: "+end.toLocaleString()+"<br>"+
"Duration: "+duration(start,end);

const div=document.createElement("div");

div.className="stop";

div.innerHTML=text;

div.onclick=()=>showMarker(lat,lng,text);

list.appendChild(div);

}

}

loadStops();

</script>

</body>
</html>
