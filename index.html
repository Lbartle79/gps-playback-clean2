<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>GPS Timeline Viewer</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<style>

body{
margin:0;
font-family:Arial;
display:flex;
height:100vh;
}

#list{
width:420px;
overflow:auto;
border-right:1px solid #ccc;
padding:12px;
font-size:18px;
}

.segment{
border:1px solid #ccc;
margin-bottom:8px;
padding:10px;
cursor:pointer;
}

.segment:hover{
background:#eee;
}

#map{
flex:1;
}

</style>
</head>

<body>

<div id="list">Loading timeline…</div>
<div id="map"></div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>

const map=L.map('map').setView([52,-105],6);

L.tileLayer(
'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',
{maxZoom:19}
).addTo(map);

let marker;
let line;

fetch("location-history.json")
.then(r=>r.json())
.then(data=>{

const list=document.getElementById("list");
list.innerHTML="";

data.forEach(seg=>{

const start=new Date(seg.startTime);
const end=new Date(seg.endTime);

const startCoords=seg.activity.start.replace("geo:","").split(",");
const endCoords=seg.activity.end.replace("geo:","").split(",");

const startLat=parseFloat(startCoords[0]);
const startLng=parseFloat(startCoords[1]);

const endLat=parseFloat(endCoords[0]);
const endLng=parseFloat(endCoords[1]);

const dur=Math.round((end-start)/60000);

const div=document.createElement("div");
div.className="segment";

div.innerHTML=`
<b>${start.toLocaleDateString()}</b><br>
Start: ${start.toLocaleTimeString()}<br>
End: ${end.toLocaleTimeString()}<br>
Duration: ${dur} minutes<br>
Start: ${startLat.toFixed(5)}, ${startLng.toFixed(5)}<br>
End: ${endLat.toFixed(5)}, ${endLng.toFixed(5)}
`;

div.onclick=()=>{

if(marker)map.removeLayer(marker);
if(line)map.removeLayer(line);

marker=L.marker([startLat,startLng]).addTo(map);

line=L.polyline(
[[startLat,startLng],[endLat,endLng]],
{color:"red"}
).addTo(map);

map.setView([startLat,startLng],15);

};

list.appendChild(div);

});

});

</script>

</body>
</html>
