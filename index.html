<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>

<title>GPS Timeline (Final Stable)</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<style>
body { margin:0; font-family:Arial; }
#controls { padding:10px; background:#f0f0f0; border-bottom:1px solid #ccc; }
#map { height:50vh; }
#timeline { height:50vh; overflow-y:auto; padding:10px; background:#fafafa; }
.item { padding:10px; border-bottom:1px solid #ddd; cursor:pointer; }
.item:hover { background:#eee; }
</style>
</head>

<body>

<div id="controls">
<button onclick="toggleSatellite()">Satellite</button>

<label style="margin-left:10px;">Jump to date:</label>
<input type="date" id="dateJump">
<button onclick="jumpToDate()">Go</button>
</div>

<div id="map"></div>
<div id="timeline"></div>

<script>

// MAP
let map = L.map('map').setView([54,-106],5)

let road = L.tileLayer(
'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',
{maxZoom:19}
).addTo(map)

let sat = L.tileLayer(
'https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}',
{maxZoom:19}
)

let satellite = false

function toggleSatellite(){
if(satellite){
map.removeLayer(sat)
map.addLayer(road)
satellite=false
}else{
map.removeLayer(road)
map.addLayer(sat)
satellite=true
}
}

// =====================
// CLEAN REBUILT DATA
// =====================

let rawSegments = [
{start:[51.631540,-109.977654],end:[51.632983,-109.978113],startTime:1739134447162,endTime:1739135755018},
{start:[51.631895,-109.977994],end:[51.631860,-109.594927],startTime:1739135755018,endTime:1739294193713},
{start:[51.634805,-109.619287],end:[51.648845,-109.663609],startTime:1739294193713,endTime:1739328329043}
];

let points = [];

// expand segments into smooth timeline points
rawSegments.forEach(seg => {

let steps = 12;

for(let i=0;i<=steps;i++){

let t = i/steps;

let lat = seg.start[0] + (seg.end[0]-seg.start[0]) * t;
let lon = seg.start[1] + (seg.end[1]-seg.start[1]) * t;

let time = seg.startTime + (seg.endTime - seg.startTime) * t;

points.push({
lat,
lon,
time: new Date(time)
});

}

});

// sort points
points.sort((a,b)=> a.time - b.time);

// =====================
// MAP + TIMELINE
// =====================

let activeMarkers = []
let activeLine = null

buildTimeline();

// =====================
// JUMP TO DATE
// =====================

function jumpToDate(){

let input = document.getElementById("dateJump").value
if(!input) return

let items = document.getElementsByClassName("item")

for(let i=0;i<points.length;i++){

let d = points[i].time
let localDate = d.toLocaleDateString('en-CA')

if(localDate === input){

items[i].scrollIntoView({behavior:"smooth"})
items[i].click()
return
}

}

alert("No data for that date")
}

// =====================
// TIMELINE
// =====================

function buildTimeline(){

let t=document.getElementById("timeline")
t.innerHTML = ""

points.forEach(p=>{

let d = p.time

let dateStr = d.toLocaleDateString('en-CA')
let timeStr = d.toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'})

// group same day
let sameDay = points.filter(x =>
x.time.toLocaleDateString('en-CA') === dateStr
)

let label =
(p === sameDay[0]) ? "Start" :
(p === sameDay[sameDay.length - 1]) ? "Stop" :
"Movement"

let div=document.createElement("div")
div.className="item"

div.innerHTML =
"<b>" + dateStr + "</b><br>" +
timeStr + "<br>" +
label

div.onclick=()=>{

// clear map
activeMarkers.forEach(m => map.removeLayer(m))
activeMarkers = []

if(activeLine){
map.removeLayer(activeLine)
}

// build route
let latlngs = []

for(let i = 0; i < sameDay.length - 1; i++){

let a = sameDay[i]
let b = sameDay[i+1]

let timeDiff = (b.time - a.time) / 1000
if(timeDiff <= 0) continue

let distance = map.distance([a.lat,a.lon],[b.lat,b.lon])
let speed = distance / timeDiff

if(speed > 50) continue
if(distance > 20000) continue

latlngs.push([a.lat,a.lon])
latlngs.push([b.lat,b.lon])
}

// draw route
if(latlngs.length > 1){
activeLine = L.polyline(latlngs, {
color:'cyan',
weight:4
}).addTo(map)

map.fitBounds(activeLine.getBounds())
}

// marker
let marker = L.marker([p.lat,p.lon]).addTo(map)
activeMarkers.push(marker)

}

t.appendChild(div)

})

}

</script>

</body>
</html>
