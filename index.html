<script>

let map = L.map('map').setView([54,-106],5);

L.tileLayer(
'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',
{maxZoom:19}
).addTo(map);

let markers = [];
let routeLine = null;
let allPoints = [];

// CLEAR MAP
function clearMap(){
    markers.forEach(m=>map.removeLayer(m));
    markers = [];
    if(routeLine) map.removeLayer(routeLine);
}

// FORMAT TIME
function formatTime(t){
    return new Date(t).toLocaleString("en-CA", {
        timeZone:"America/Regina"
    });
}

// ADD POINT
function addPoint(time, lat, lon, type){
    let d = new Date(time);
    let day = d.toISOString().split("T")[0];

    allPoints.push({
        lat: parseFloat(lat),
        lon: parseFloat(lon),
        time: d,
        date: day,
        type: type
    });
}

// LOAD JSON
fetch("location-history.json")
.then(r=>r.json())
.then(data=>{

    data.forEach(item=>{

        if(item.visit){
            let p = item.visit.topCandidate.placeLocation
            .replace("geo:","").split(",");

            addPoint(item.startTime, p[0], p[1], "Stop");
        }

        if(item.activity){
            let s = item.activity.start
            .replace("geo:","").split(",");

            addPoint(item.startTime, s[0], s[1], "Move");
        }

        if(item.timelinePath){
            item.timelinePath.forEach(p=>{
                let c = p.point.replace("geo:","").split(",");
                addPoint(item.startTime, c[0], c[1], "Breadcrumb");
            });
        }

    });

    buildDaySelector();

});

// BUILD DAY SELECTOR
function buildDaySelector(){

    let days = [...new Set(allPoints.map(p=>p.date))].sort();

    let select = document.getElementById("daySelect");

    days.forEach(d=>{
        let opt = document.createElement("option");
        opt.value = d;
        opt.text = d;
        select.appendChild(opt);
    });

    loadDay(days[0]);
}

// LOAD SINGLE DAY
function loadDay(day){

    clearMap();

    let pts = allPoints
        .filter(p=>p.date===day)
        .sort((a,b)=>a.time-b.time);

    if(pts.length === 0) return;

    let latlngs = [];

    pts.forEach(p=>{

        latlngs.push([p.lat,p.lon]);

        let color = p.type==="Stop" ? "red" : "blue";

        let m = L.circleMarker([p.lat,p.lon],{
            radius:5,
            color:color
        }).addTo(map);

        m.bindPopup(
            `<b>${p.type}</b><br>${formatTime(p.time)}`
        );

        markers.push(m);

    });

    routeLine = L.polyline(latlngs,{color:"blue"}).addTo(map);
    map.fitBounds(routeLine.getBounds());

    buildTimeline(pts);
}

// BUILD TIMELINE (CLICKABLE)
function buildTimeline(points){

    let t = document.getElementById("timeline");
    t.innerHTML = "";

    points.forEach(p=>{

        let div = document.createElement("div");
        div.className = "item";

        div.innerHTML =
            formatTime(p.time) + " — " + p.type;

        div.onclick = ()=>{
            map.setView([p.lat,p.lon],14);
        };

        t.appendChild(div);

    });

}

// EVENT
document.getElementById("daySelect")
.addEventListener("change", function(){
    loadDay(this.value);
});

</script>
