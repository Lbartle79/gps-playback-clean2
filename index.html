<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>GPS Investigator Map</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<style>
body{margin:0;font-family:Arial;}

#controls{
padding:10px;
background:#222;
color:white;
}

#map{height:55vh;}

#timeline{
height:35vh;
overflow-y:auto;
padding:10px;
background:#f5f5f5;
}

.item{
padding:8px;
border-bottom:1px solid #ccc;
cursor:pointer;
}
</style>
</head>

<body>

<div id="controls">
Select Date:
<input type="date" id="datePicker">
</div>

<div id="map"></div>
<div id="timeline"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>

let map = L.map('map').setView([54,-106],5)

L.tileLayer(
'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',
{maxZoom:19}
).addTo(map)

let allPoints=[]
let markers=[]
let routeLine=null

fetch("location-history.json")
.then(r=>r.json())
.then(data=>{

data.forEach(item=>{

if(item.visit){
let p=item.visit.topCandidate.placeLocation.replace("geo:","").split(",")

allPoints.push({
lat:+p[0],
lon:+p[1],
time:new Date(item.startTime),
type:"Stop"
})
}

if(item.activity){
let s=item.activity.start.replace("geo:","").split(",")

allPoints.push({
lat:+s[0],
lon:+s[1],
time:new Date(item.startTime),
type:"Movement"
})
}

})

allPoints.sort((a,b)=>a.time-b.time)
let selectedDay = "2025-02-12"  // ← change this anytime

allPoints = allPoints.filter(p =>
p.time.toISOString().slice(0,10) === selectedDay
)
})

function clearMap(){
markers.forEach(m=>map.removeLayer(m))
markers=[]
if(routeLine) map.removeLayer(routeLine)
}

function loadDay(selectedDate){

clearMap()

let filtered = allPoints.filter(p=>{
return p.time.toISOString().slice(0,10) === selectedDate
})

let latlngs=[]
let timeline=document.getElementById("timeline")
timeline.innerHTML=""

filtered.forEach(p=>{

let latlng=[p.lat,p.lon]
latlngs.push(latlng)

let color = p.type==="Stop"?"red":"blue"

let m = L.circleMarker(latlng,{
radius:5,
color:color
}).addTo(map)

markers.push(m)

m.bindPopup(
p.time.toLocaleString()+"<br>"+p.type
)

let div=document.createElement("div")
div.className="item"

div.innerHTML=
p.time.toLocaleTimeString()+" - "+p.type

div.onclick=()=>{
map.setView(latlng,14)
}

timeline.appendChild(div)

})

if(latlngs.length>1){
routeLine=L.polyline(latlngs,{color:"blue"}).addTo(map)
map.fitBounds(routeLine.getBounds())
}

}

document.getElementById("datePicker").addEventListener("change",(e)=>{
loadDay(e.target.value)
})

</script>

</body>
</html>
