<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Location Timeline Map</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<style>

body{
font-family:Arial;
margin:0;
}

#controls{
padding:10px;
background:#eee;
}

#map{
height:60vh;
}

#timeline{
height:40vh;
overflow-y:scroll;
padding:10px;
}

.dayTitle{
font-size:20px;
margin-top:20px;
font-weight:bold;
}

.entry{
cursor:pointer;
margin:4px 0;
}

</style>
</head>

<body>

<div id="controls">

<input id="jumpDate" type="date">
<button onclick="jumpToDate()">Jump To Date</button>

</div>

<div id="map"></div>

<div id="timeline"></div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>

let map=L.map('map').setView([53,-106],6)

L.tileLayer(
'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',
{maxZoom:19}
).addTo(map)

let markers=[]
let days={}
let points=[]

function formatTime(d){

return new Date(d).toLocaleTimeString("en-CA",{
timeZone:"America/Regina",
hour:"numeric",
minute:"2-digit",
hour12:true
})

}

function clearMarkers(){

markers.forEach(m=>map.removeLayer(m))
markers=[]

}

function addMarker(p){

let m=L.marker([p.lat,p.lon]).addTo(map)

m.bindPopup(
"<b>"+p.type+"</b><br>"+
formatTime(p.time)+"<br>"+
p.lat+", "+p.lon
)

markers.push(m)

}

function showDay(day){

clearMarkers()

days[day].forEach(p=>addMarker(p))

}

function jumpToDate(){

let d=document.getElementById("jumpDate").value

if(days[d]){

showDay(d)

document.getElementById(d).scrollIntoView()

}

}

function addPoint(time,lat,lon,type){

let d=new Date(time)

let day=d.toISOString().split("T")[0]

let p={
time:d,
lat:parseFloat(lat),
lon:parseFloat(lon),
type:type,
day:day
}

points.push(p)

}

fetch("location-history.json")
.then(r=>r.json())
.then(data=>{

data.forEach(item=>{

if(item.activity){

let s=item.activity.start.replace("geo:","").split(",")
let e=item.activity.end.replace("geo:","").split(",")

addPoint(item.startTime,s[0],s[1],"movement start")
addPoint(item.endTime,e[0],e[1],"movement end")

}

if(item.visit){

let c=item.visit.topCandidate.placeLocation.replace("geo:","").split(",")

addPoint(item.startTime,c[0],c[1],"stop")

}

if(item.timelinePath){

item.timelinePath.forEach(p=>{

let c=p.point.replace("geo:","").split(",")

addPoint(item.startTime,c[0],c[1],"breadcrumb")

})

}

})

points.sort((a,b)=>a.time-b.time)

points.forEach(p=>{

if(!days[p.day]) days[p.day]=[]

days[p.day].push(p)

})

buildTimeline()

})

function buildTimeline(){

let t=document.getElementById("timeline")

Object.keys(days).forEach(day=>{

let title=document.createElement("div")
title.className="dayTitle"
title.id=day
title.innerText=day

title.onclick=()=>showDay(day)

t.appendChild(title)

days[day].forEach(p=>{

let e=document.createElement("div")
e.className="entry"

e.innerText=formatTime(p.time)+" — "+p.type

e.onclick=()=>{

clearMarkers()
addMarker(p)

}

t.appendChild(e)

})

})

}

</script>

</body>
</html>
