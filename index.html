<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Forensic Location Timeline</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<style>

body{
font-family:Arial;
margin:0;
background:#111;
color:white;
}

#controls{
padding:10px;
background:#222;
position:sticky;
top:0;
z-index:1000;
}

button{
font-size:16px;
padding:6px 10px;
margin-right:5px;
}

#map{
height:60vh;
}

#timeline{
height:40vh;
overflow-y:scroll;
padding:10px;
background:#000;
}

.dayTitle{
font-size:20px;
margin-top:20px;
color:#66ccff;
}

.entry{
cursor:pointer;
margin:4px 0;
font-size:16px;
}

</style>
</head>

<body>

<div id="controls">

<input id="jumpDate" type="date">
<button onclick="jumpToDate()">Jump To Date</button>

</div>

<div id="map"></div>
<div id="timeline"></div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>

let map = L.map('map').setView([53.2,-105.7],7);

L.tileLayer(
'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',
{maxZoom:19}
).addTo(map);

let markers=[];
let allPoints=[];
let days={};

function formatTime(date){

let h=date.getHours();
let m=date.getMinutes();
let ampm=h>=12?"PM":"AM";

h=h%12;
if(h==0)h=12;

return h+":"+m.toString().padStart(2,'0')+" "+ampm;

}

function addMarker(p){

let marker=L.marker([p.lat,p.lon]).addTo(map);

marker.bindPopup(
"<b>"+p.type+"</b><br>"+
p.time+"<br>"+
p.lat+", "+p.lon
);

markers.push(marker);

}

function clearMarkers(){

markers.forEach(m=>map.removeLayer(m));
markers=[];

}

function showDay(day){

clearMarkers();

let list=days[day];

list.forEach(p=>addMarker(p));

}

function jumpToDate(){

let d=document.getElementById("jumpDate").value;

if(days[d]){

showDay(d);

document.getElementById(d).scrollIntoView();

}

}

function processPoint(time,lat,lon,type){

let d=new Date(time);

let day=d.toISOString().split("T")[0];

let point={
time:formatTime(d),
lat:lat,
lon:lon,
type:type,
date:day
};

allPoints.push(point);

}

function buildDays(){

allPoints.sort((a,b)=>new Date(a.time)-new Date(b.time));

allPoints.forEach(p=>{

if(!days[p.date])days[p.date]=[];

days[p.date].push(p);

});

}

function buildTimeline(){

let div=document.getElementById("timeline");

Object.keys(days).forEach(day=>{

let title=document.createElement("div");
title.className="dayTitle";
title.id=day;
title.innerText=day;

div.appendChild(title);

days[day].forEach(p=>{

let e=document.createElement("div");
e.className="entry";

e.innerText=p.time+" — "+p.type;

e.onclick=()=>{

clearMarkers();
addMarker(p);

};

div.appendChild(e);

});

});

}

fetch("location-history.json")
.then(r=>r.json())
.then(data=>{

data.forEach(item=>{

if(item.activity){

let start=item.activity.start.replace("geo:","").split(",");
let end=item.activity.end.replace("geo:","").split(",");

processPoint(item.startTime,start[0],start[1],"movement start");
processPoint(item.endTime,end[0],end[1],"movement end");

}

if(item.visit){

let loc=item.visit.topCandidate.placeLocation.replace("geo:","").split(",");

processPoint(item.startTime,loc[0],loc[1],"stop");

}

if(item.timelinePath){

item.timelinePath.forEach(p=>{

let coords=p.point.replace("geo:","").split(",");

processPoint(item.startTime,coords[0],coords[1],"breadcrumb");

});

}

});

buildDays();
buildTimeline();

});

</script>

</body>
</html>
