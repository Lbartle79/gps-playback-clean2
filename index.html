<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>GPS Timeline Map</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css">
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<style>
body{margin:0;font-family:Arial}

#map{
height:50vh;
}

#timeline{
height:50vh;
overflow-y:auto;
padding:10px;
background:#f5f5f5;
}

.day{
font-weight:bold;
margin-top:10px;
font-size:18px;
}

.item{
background:white;
border-radius:6px;
padding:10px;
margin-top:6px;
border:1px solid #ddd;
}

.item:hover{
background:#eef5ff;
cursor:pointer;
}

button{
margin:10px;
padding:8px 12px;
font-size:16px;
}
</style>
</head>

<body>

<div id="map"></div>

<button onclick="toggleSatellite()">Toggle Satellite</button>

<div id="timeline"></div>

<script>

let map = L.map('map').setView([53,-106],6)

let street = L.tileLayer(
'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',
{maxZoom:19}
).addTo(map)

let satellite = L.tileLayer(
'https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}',
{maxZoom:19}
)

let usingSatellite=false

function toggleSatellite(){

if(usingSatellite){
map.removeLayer(satellite)
map.addLayer(street)
}else{
map.removeLayer(street)
map.addLayer(satellite)
}

usingSatellite=!usingSatellite
}

let marker

fetch('location-history.json')
.then(r=>r.json())
.then(data=>{

let timeline=document.getElementById("timeline")

data.forEach(item=>{

if(item.activity){

let s=item.activity.start.replace("geo:","").split(",")
let e=item.activity.end.replace("geo:","").split(",")

let lat=parseFloat(e[0])
let lon=parseFloat(e[1])

let start=new Date(item.startTime)
let end=new Date(item.endTime)

let day=start.toDateString()

let div=document.createElement("div")
div.className="item"

div.innerHTML=
"<b>"+day+"</b><br>"+
start.toLocaleTimeString()+" → "+
end.toLocaleTimeString()

div.onclick=function(){

if(marker){
map.removeLayer(marker)
}

marker=L.marker([lat,lon]).addTo(map)

map.setView([lat,lon],12)

}

timeline.appendChild(div)

}

})

})

</script>

</body>
</html>
