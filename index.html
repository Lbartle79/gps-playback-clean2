<script>

// ===== PARSE VISITS FROM RAW DATA =====

function formatLocal(dateStr) {
  return new Date(dateStr).toLocaleString();
}

function calculateDuration(start, end) {
  const s = new Date(start);
  const e = new Date(end);
  const diff = (e - s) / 1000 / 60;
  const h = Math.floor(diff / 60);
  const m = Math.floor(diff % 60);
  return h + "h " + m + "m";
}

const stops = [];

rawData.forEach(entry => {
  if (entry.visit && entry.visit.hierarchyLevel === "0") {

    const start = entry.startTime;
    const end = entry.endTime;
    const geo = entry.visit.topCandidate.placeLocation;

    if (geo && geo.startsWith("geo:")) {
      const coords = geo.replace("geo:", "").split(",");
      stops.push({
        lat: parseFloat(coords[0]),
        lng: parseFloat(coords[1]),
        arrival: start,
        departure: end,
        duration: calculateDuration(start, end)
      });
    }
  }
});

// ===== BUILD MAP =====

const map = L.map('map').setView([53.2, -105.75], 10);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  attribution: '© OpenStreetMap contributors'
}).addTo(map);

let marker;

const listDiv = document.getElementById('list');

stops.forEach((stop, index) => {

  const div = document.createElement('div');
  div.className = 'stop';

  div.innerHTML = `
    <strong>Stop ${index+1}</strong><br>
    Arrival: ${formatLocal(stop.arrival)}<br>
    Departure: ${formatLocal(stop.departure)}<br>
    Duration: ${stop.duration}<br>
    Coordinates: ${stop.lat}, ${stop.lng}
  `;

  div.onclick = () => {

    if (marker) map.removeLayer(marker);

    marker = L.marker([stop.lat, stop.lng]).addTo(map);

    marker.bindPopup(`
      <strong>Stop ${index+1}</strong><br>
      Arrival: ${formatLocal(stop.arrival)}<br>
      Departure: ${formatLocal(stop.departure)}<br>
      Duration: ${stop.duration}<br>
      Coordinates: ${stop.lat}, ${stop.lng}
    `).openPopup();

    map.setView([stop.lat, stop.lng], 15);
  };

  listDiv.appendChild(div);
});

</script>

</body>
</html>
